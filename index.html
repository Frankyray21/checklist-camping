<!DOCTYPE html>
<html lang="fr-CA">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Camping en tente</title>
<meta name="description" content="Liste de camping en tente, l'été avec les flos. Coche, le feu va pogner.">
<meta name="theme-color" content="#13241B">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Camping">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --nuit:#13241B;
    --nuit-2:#0D1812;
    --foret:#1E3A2C;
    --toile:#EFE6D3;
    --toile-2:#E4D7BC;
    --encre:#21332A;
    --braise:#E8763C;
    --flamme:#F4A93D;
    --or:#FBD46A;
    --ciel:#7BA0AE;
    --cendre:#9DAA9C;
    --ombre:0 10px 30px rgba(0,0,0,.35);
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

  body{
    margin:0;
    font-family:'Hanken Grotesk',system-ui,sans-serif;
    color:var(--toile);
    background:
      repeating-radial-gradient(circle at 70% -10%, rgba(123,160,174,.05) 0 1px, transparent 1px 26px),
      repeating-radial-gradient(circle at 15% 120%, rgba(232,118,60,.05) 0 1px, transparent 1px 32px),
      radial-gradient(120% 80% at 50% -10%, var(--foret) 0%, var(--nuit) 45%, var(--nuit-2) 100%);
    background-attachment:fixed;
    min-height:100vh;
    line-height:1.45;
  }

  /* Coucher de soleil qui se réchauffe selon l'avancement */
  .sky{
    position:fixed; inset:0; z-index:-1; pointer-events:none;
    opacity:0; transition:opacity 1s ease;
    background:linear-gradient(to bottom,
      #10203c 0%,
      #2a2b52 22%,
      #5b3b6b 40%,
      #a34f70 54%,
      #d9713f 64%,
      #e79a43 70%,
      #6c4330 78%,
      #26201c 100%);
  }
  @media (prefers-reduced-motion: reduce){ .sky{ transition:none; } }

  /* Étoiles qui s'allument quand la nuit tombe */
  .stars{position:fixed; left:0; right:0; top:0; height:62%; z-index:-1; pointer-events:none;
    opacity:0; transition:opacity 1.2s ease;}
  .star{position:absolute; border-radius:50%; background:#fff9ec; box-shadow:0 0 4px rgba(255,246,220,.75);}
  @media (prefers-reduced-motion: no-preference){ .star{animation:twinkle 3s ease-in-out infinite;} }
  @keyframes twinkle{0%,100%{opacity:var(--o,.85);} 50%{opacity:calc(var(--o,.85) * .25);}}

  /* Lune qui se lève vers la fin (tape dessus pour un vœu) */
  .moon{position:fixed; top:62px; right:30px; width:34px; height:34px; border:0; padding:0; border-radius:50%;
    z-index:40; pointer-events:none; opacity:0; transition:opacity 1.2s ease, transform 1.2s ease;
    transform:translateY(8px); background:transparent; -webkit-appearance:none; appearance:none;
    box-shadow: inset -9px -5px 0 0 #f4edcf, 0 0 16px rgba(251,212,106,.28);}
  .moon:focus-visible{outline:3px solid var(--ciel); outline-offset:3px;}
  .moon.up{transform:translateY(0); pointer-events:auto; cursor:pointer;}
  .moon.up:hover{box-shadow: inset -9px -5px 0 0 #fff6dd, 0 0 22px rgba(251,212,106,.5);}
  .moon.up:active{transform:scale(.92); transition-duration:.08s;}

  /* Aurores boréales, en récompense proche de 100% */
  .aurora{position:fixed; left:-20%; right:-20%; top:0; height:46%; z-index:-1; pointer-events:none;
    opacity:0; transition:opacity 1.5s ease; filter:blur(9px); mix-blend-mode:screen;
    background:
      radial-gradient(58% 135% at 26% 0%, rgba(96,230,168,.46), transparent 62%),
      radial-gradient(52% 145% at 58% 0%, rgba(122,176,244,.34), transparent 62%),
      radial-gradient(48% 135% at 85% 0%, rgba(158,244,196,.36), transparent 64%);}
  @media (prefers-reduced-motion: no-preference){ .aurora{animation:aurora 9s ease-in-out infinite alternate;} }
  @keyframes aurora{0%{transform:translateX(-4%) skewX(-7deg) scaleY(1);} 100%{transform:translateX(4%) skewX(7deg) scaleY(1.14);}}

  /* Constellation cachée: une petite tente dans les étoiles */
  .constel{position:fixed; top:15%; left:7%; width:66px; height:58px; z-index:-1; pointer-events:none;
    opacity:0; transition:opacity 1.2s ease;}

  /* Étoiles filantes (nuit profonde) */
  .shoot{position:fixed; z-index:-1; pointer-events:none; width:2px; height:2px; border-radius:50%;
    background:#fff; box-shadow:0 0 6px 1px rgba(255,255,255,.9);}
  .shoot::after{content:""; position:absolute; right:2px; top:50%; width:90px; height:1.6px;
    transform:translateY(-50%); border-radius:2px;
    background:linear-gradient(to left, rgba(255,255,255,.85), transparent);}
  @keyframes shoot{
    0%{opacity:0; transform:translate(0,0) rotate(20deg);}
    10%{opacity:1;}
    100%{opacity:0; transform:translate(230px,84px) rotate(20deg);}
  }

  /* Barre fine collante en haut */
  .rail{
    position:sticky; top:0; z-index:50;
    display:flex; align-items:center; gap:12px;
    padding:10px 16px calc(10px + env(safe-area-inset-top,0)) 16px;
    padding-top:max(10px, env(safe-area-inset-top,0));
    background:linear-gradient(to bottom, rgba(13,24,18,.96), rgba(13,24,18,.82));
    backdrop-filter:blur(8px);
    border-bottom:1px solid rgba(239,230,211,.08);
  }
  .rail .railbar{flex:1; height:5px; border-radius:99px; background:rgba(239,230,211,.12); overflow:hidden;}
  .rail .railbar i{display:block; height:100%; width:0; border-radius:99px;
    background:linear-gradient(90deg, var(--braise), var(--or)); transition:width .45s cubic-bezier(.22,1,.36,1);}
  .rail .railpct{font-weight:800; font-size:14px; min-width:42px; text-align:right; letter-spacing:.3px;}

  .wrap{max-width:560px; margin:0 auto; padding:0 16px 60px;}

  /* Entête + feu */
  .hero{padding:18px 4px 8px; text-align:center;}
  .eyebrow{
    font-size:12px; letter-spacing:3px; text-transform:uppercase;
    color:var(--ciel); font-weight:700; margin:0 0 6px;
  }
  h1{
    font-family:'Anton',sans-serif; font-weight:400;
    font-size:clamp(40px,12vw,62px); line-height:.92;
    margin:0; letter-spacing:1px; text-transform:uppercase;
    color:var(--toile);
    -webkit-user-select:none; user-select:none;   /* taper 5x pour la poutine sans sélectionner le texte */
  }
  .sous{margin:8px 0 0; color:var(--cendre); font-size:15px;}

  .feu{position:relative; height:170px; margin:6px auto 2px; width:220px; --fire:0;}
  .glow{
    position:absolute; left:50%; bottom:14px; transform:translateX(-50%);
    width:170px; height:170px; border-radius:50%;
    background:radial-gradient(circle, rgba(244,169,61,.55) 0%, rgba(232,118,60,.28) 35%, transparent 68%);
    opacity:calc(.18 + .82 * var(--fire));
    filter:blur(6px);
    transition:opacity .5s ease;
  }
  .buche{position:absolute; bottom:10px; left:50%; width:96px; height:18px; border-radius:9px;
    background:linear-gradient(180deg,#6b4a32,#3f2a1c);
    box-shadow:inset 0 -3px 4px rgba(0,0,0,.4), 0 0 14px rgba(232,118,60,calc(.25 + .5*var(--fire)));}
  .buche.b1{transform:translateX(-50%) rotate(-16deg);}
  .buche.b2{transform:translateX(-50%) rotate(15deg);}
  .buche::after{content:""; position:absolute; inset:0 6px; border-radius:9px;
    background:radial-gradient(circle at 50% 120%, rgba(244,169,61,calc(.7*var(--fire))), transparent 60%);}

  .flammes{position:absolute; left:50%; bottom:20px; transform:translateX(-50%); width:90px; height:120px;
    transform-origin:bottom center; mix-blend-mode:screen;
    filter:saturate(calc(1 + .18*var(--fire))) hue-rotate(calc(-11deg * var(--fire)));}  /* reflet rosé au coucher */
  .flamme{position:absolute; left:50%; bottom:0; transform:translateX(-50%);
    border-radius:50% 50% 50% 50% / 62% 62% 38% 38%; filter:blur(2px); transform-origin:bottom center;}
  .f1{width:calc(56px*(.45 + .55*var(--fire))); height:calc(112px*(.28 + .72*var(--fire)));
    background:linear-gradient(0deg, var(--braise) 0%, #c4421f 45%, transparent 100%); opacity:calc(.5 + .5*var(--fire));}
  .f2{width:calc(38px*(.45 + .55*var(--fire))); height:calc(82px*(.28 + .72*var(--fire)));
    background:linear-gradient(0deg, var(--flamme) 0%, var(--braise) 55%, transparent 100%); opacity:calc(.55 + .45*var(--fire));}
  .f3{width:calc(20px*(.5 + .5*var(--fire))); height:calc(48px*(.3 + .7*var(--fire)));
    background:linear-gradient(0deg, var(--or) 0%, #fff3cf 60%, transparent 100%); opacity:calc(.4 + .6*var(--fire));}

  .spark{position:absolute; left:50%; bottom:34px; width:4px; height:4px; border-radius:50%;
    background:var(--or); opacity:0;}

  @media (prefers-reduced-motion: no-preference){
    .f1{animation:flick1 1.9s ease-in-out infinite;}
    .f2{animation:flick2 1.35s ease-in-out infinite;}
    .f3{animation:flick3 .85s ease-in-out infinite;}
    .glow{animation:breathe 2.6s ease-in-out infinite;}
    .spark{animation:rise 2.4s linear infinite;}
    .s1{animation-delay:.1s; left:42%;}
    .s2{animation-delay:.7s; left:58%;}
    .s3{animation-delay:1.3s; left:48%;}
    .s4{animation-delay:1.9s; left:54%;}
    .s5{animation-delay:1s; left:46%;}
  }
  @keyframes flick1{
    0%,100%{transform:translateX(-50%) scaleY(1) scaleX(1) rotate(-1deg);}
    27%{transform:translateX(-51.5%) scaleY(1.07) scaleX(.95) rotate(.8deg);}
    52%{transform:translateX(-48.5%) scaleY(.94) scaleX(1.04) rotate(1.4deg);}
    76%{transform:translateX(-52%) scaleY(1.09) scaleX(.93) rotate(-.7deg);}
  }
  @keyframes flick2{
    0%,100%{transform:translateX(-50%) scaleY(.97) skewX(2deg);}
    30%{transform:translateX(-48%) scaleY(1.09) skewX(-3deg);}
    55%{transform:translateX(-51%) scaleY(.92) skewX(1deg) scaleX(1.05);}
    80%{transform:translateX(-49%) scaleY(1.06) skewX(-2deg);}
  }
  @keyframes flick3{
    0%,100%{transform:translateX(-50%) scaleY(1) translateY(0);}
    24%{transform:translateX(-51.5%) scaleY(1.14) translateY(-3px);}
    50%{transform:translateX(-49%) scaleY(.9) translateY(1px) scaleX(1.08);}
    74%{transform:translateX(-51%) scaleY(1.1) translateY(-4px);}
  }
  @keyframes breathe{0%,100%{opacity:calc(.18 + .82*var(--fire));} 50%{opacity:calc(.1 + .72*var(--fire));}}
  @keyframes rise{
    0%{opacity:0; transform:translate(-50%,0) scale(1);}
    12%{opacity:calc(.9*var(--fire));}
    38%{transform:translate(calc(-50% + 6px),-34px) scale(.82);}
    64%{transform:translate(calc(-50% - 5px),-62px) scale(.62);}
    100%{opacity:0; transform:translate(calc(-50% + 3px),-95px) scale(.35);}
  }

  /* --- Réactions rigolotes du feu --- */
  .feu{transition:transform .2s cubic-bezier(.34,1.56,.64,1);}
  .feu.recu{transform:translateY(-3px) scale(1.05);}

  /* Fumée: forte quand le feu est mort, disparaît quand ça chauffe */
  .smoke{position:absolute; left:50%; bottom:26px; transform:translateX(-50%);
    width:60px; height:90px; opacity:calc(.65*(1 - var(--fire))); transition:opacity .5s ease; pointer-events:none;}
  .wisp{position:absolute; bottom:0; left:50%; width:16px; height:16px; border-radius:50%;
    background:radial-gradient(circle, rgba(197,204,197,.55), rgba(197,204,197,0) 70%); opacity:0;}

  /* Guimauve qui grille quand le feu est assez fort */
  .gui{position:absolute; right:12px; bottom:20px; width:72px; height:84px;
    opacity:calc((var(--fire) - .45) * 2.2); transition:opacity .5s ease; pointer-events:none; transform-origin:right bottom;}
  .gui .stick{position:absolute; right:0; bottom:8px; width:66px; height:3px; border-radius:2px;
    background:linear-gradient(90deg,#7a5a3a,#a67c48); transform:rotate(-18deg); transform-origin:right center;}
  .gui .mallow{position:absolute; left:1px; top:19px; width:16px; height:20px; border-radius:7px;
    background:radial-gradient(circle at 50% 32%, #fff8ee, #efdcc0 68%, #e6c49a 100%);
    box-shadow:0 0 calc(10px*var(--fire)) rgba(244,169,61,calc(.85*var(--fire)));}

  /* Gerbe d'étincelles créée à chaque coche */
  .burst{position:absolute; left:50%; bottom:36px; width:5px; height:5px; border-radius:50%;
    background:radial-gradient(circle,#fff3cf,var(--or) 60%,var(--braise)); opacity:0; pointer-events:none;
    box-shadow:0 0 6px rgba(251,212,106,.9); animation:burst .9s ease-out forwards;}

  /* Braises qui pleuvent pendant la fête (100%) */
  .ember{position:absolute; bottom:30px; width:6px; height:6px; border-radius:50%;
    background:radial-gradient(circle,var(--or),var(--braise) 70%); opacity:0; pointer-events:none;
    box-shadow:0 0 7px rgba(232,118,60,.8); animation:ember 1.7s ease-in forwards;}

  /* Raton laveur voleur de guimauve */
  .raton{position:absolute; right:6px; bottom:20px; width:60px; height:50px;
    opacity:0; pointer-events:none; z-index:6; transform:translateX(170px);
    animation:heist 4s ease-in-out forwards;
    filter:drop-shadow(0 0 2px rgba(239,230,211,.55)) drop-shadow(0 3px 5px rgba(0,0,0,.5));}
  .raton svg{width:100%; height:100%; display:block;}
  .raton .loot{position:absolute; left:1px; bottom:4px; width:12px; height:14px; border-radius:5px;
    background:radial-gradient(circle at 50% 32%, #fff8ee, #efdcc0 70%, #e6c49a);
    box-shadow:0 0 7px rgba(244,169,61,.85); opacity:0; transform:scale(.4);
    transition:opacity .15s ease, transform .15s ease;}
  .raton.plein .loot{opacity:1; transform:scale(1);}
  .gui.vole .mallow{opacity:0; transition:opacity .12s ease;}
  @keyframes heist{
    0%{transform:translateX(160px) translateY(2px); opacity:0;}
    8%{opacity:1;}
    30%{transform:translateX(4px) translateY(0);}
    38%{transform:translateX(-3px) translateY(-4px);}
    46%{transform:translateX(0) translateY(0);}
    100%{transform:translateX(-310px) translateY(3px); opacity:0;}
  }

  /* La moufette qui fait fuir tout le monde */
  .mouf{position:absolute; right:6px; bottom:14px; width:66px; height:60px;
    opacity:0; pointer-events:none; z-index:7; transform:translateX(185px);
    animation:moufraid 4.6s ease-in-out forwards;
    filter:drop-shadow(0 0 2px rgba(239,230,211,.5)) drop-shadow(0 3px 5px rgba(0,0,0,.5));}
  .mouf svg{width:100%; height:100%; display:block;}
  .stink{position:absolute; right:6px; bottom:20px; width:94px; height:94px; border-radius:50%;
    transform:scale(.2); opacity:0; pointer-events:none; z-index:6; filter:blur(4px);
    background:radial-gradient(circle, rgba(158,216,86,.75), rgba(120,182,60,.36) 45%, transparent 72%);
    animation:stink 2.4s ease-out forwards;}
  #bob.sacre{animation:sacre .5s ease-in-out;}
  @keyframes moufraid{
    0%{transform:translateX(185px) translateY(2px); opacity:0;}
    8%{opacity:1;}
    26%{transform:translateX(10px) translateY(0);}
    32%,54%{transform:translateX(6px) translateY(0);}
    100%{transform:translateX(-250px) translateY(3px); opacity:0;}
  }
  @keyframes stink{
    0%{opacity:0; transform:scale(.2);}
    18%{opacity:.92;}
    100%{opacity:0; transform:translate(-34px,-18px) scale(2.7);}
  }
  @keyframes sacre{
    0%,100%{transform:translateX(0) rotate(0);}
    20%{transform:translateX(-6px) rotate(-1deg);}
    50%{transform:translateX(6px) rotate(1deg);}
    80%{transform:translateX(-3px);}
  }

  /* Mini-feu collant en haut (reste visible quand on scrolle) */
  .minifeu{position:relative; width:30px; height:26px; flex:0 0 auto; --mf:0;}
  .minifeu .mflame{position:absolute; left:50%; bottom:3px; transform:translateX(-50%);
    border-radius:50% 50% 50% 50% / 60% 60% 40% 40%; filter:blur(.4px); transform-origin:bottom center;}
  .minifeu .mf1{width:calc(17px*(.55 + .45*var(--mf))); height:calc(23px*(.4 + .6*var(--mf)));
    background:linear-gradient(0deg,var(--braise),#c4421f 50%, transparent 100%); opacity:calc(.6 + .4*var(--mf));}
  .minifeu .mf2{width:calc(9px*(.55 + .45*var(--mf))); height:calc(14px*(.4 + .6*var(--mf)));
    background:linear-gradient(0deg,var(--or),#fff3cf 60%, transparent 100%); opacity:calc(.65 + .35*var(--mf));}
  .minipip{position:absolute; left:50%; bottom:0; width:16px; height:5px; border-radius:3px;
    transform:translateX(-50%) rotate(-6deg); background:linear-gradient(180deg,#6b4a32,#3f2a1c);
    box-shadow:0 0 calc(11px*(.3 + .7*var(--mf))) rgba(244,169,61,.7);}
  @media (prefers-reduced-motion: no-preference){
    .minifeu .mf1{animation:flick2 1.3s ease-in-out infinite;}
    .minifeu .mf2{animation:flick3 .9s ease-in-out infinite;}
    .minifeu.pop{animation:minipop .5s cubic-bezier(.34,1.56,.64,1);}
  }
  @keyframes minipop{0%{transform:scale(1);} 32%{transform:scale(1.4) translateY(-1px);} 100%{transform:scale(1);}}

  /* Boutons pour appeler les bibittes sur commande */
  .zoo{display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin:12px 0 0;}
  .zoobtn{border:1.5px solid rgba(239,230,211,.22); background:rgba(239,230,211,.05); color:var(--cendre);
    border-radius:99px; padding:8px 15px; cursor:pointer; font-family:inherit; font-weight:700; font-size:13.5px;
    display:inline-flex; align-items:center; gap:6px; transition:border-color .15s ease, color .15s ease, background .15s ease, transform .08s ease;}
  .zoobtn:hover{border-color:var(--braise); color:var(--flamme); background:rgba(232,118,60,.08);}
  .zoobtn:active{transform:scale(.96);}
  .zoobtn:focus-visible{outline:3px solid var(--ciel); outline-offset:2px;}
  .zoobtn:disabled{opacity:.45; cursor:default; border-color:rgba(239,230,211,.14);}
  .vols{margin:11px 0 0; font-size:13px; color:var(--cendre); font-weight:600; letter-spacing:.2px;}
  .vols b{color:var(--flamme); font-weight:800; font-variant-numeric:tabular-nums;}
  .vols.hide{display:none;}

  /* Rang de campeur évolutif */
  .rang{margin:12px 0 0; font-size:11.5px; letter-spacing:2px; text-transform:uppercase; font-weight:800; color:var(--ciel);}
  .rang b{color:var(--or); font-weight:800;}

  /* Baromètre de bines */
  .bines{display:flex; align-items:center; gap:9px; justify-content:center; margin:11px auto 0; max-width:380px;
    font-size:12.5px; color:var(--cendre); font-weight:700;}
  .bines.hide{display:none;}
  .binesbar{flex:1; height:6px; max-width:140px; border-radius:99px; background:rgba(239,230,211,.12); overflow:hidden;}
  .binesbar i{display:block; height:100%; width:0; border-radius:99px;
    background:linear-gradient(90deg,#8bbf4a,#e8b13c 55%,#c4421f); transition:width .5s ease;}
  .binesniv{white-space:nowrap; color:var(--flamme); font-weight:800;}

  /* Saucisse fugueuse */
  .saucisse{position:absolute; left:50%; bottom:34px; width:34px; height:15px; border-radius:9px; z-index:6; pointer-events:none;
    background:linear-gradient(180deg,#b0632f,#6f3a1a);
    box-shadow:inset 0 -3px 3px rgba(0,0,0,.35), 0 2px 4px rgba(0,0,0,.4);
    animation:saucisse 2.7s ease-in forwards;}
  .saucisse::before{content:""; position:absolute; inset:3px 5px; border-radius:8px;
    background:repeating-linear-gradient(90deg, transparent 0 5px, rgba(0,0,0,.2) 5px 7px);}
  .ayoye{position:absolute; z-index:7; pointer-events:none; font-family:'Anton',sans-serif; font-size:16px; color:#fff;
    text-shadow:0 1px 3px rgba(0,0,0,.65); animation:ayoye 1.5s ease-out forwards;}
  @keyframes saucisse{
    0%{transform:translateX(-50%) rotate(0deg); opacity:0;}
    8%{opacity:1;}
    100%{transform:translateX(-330px) translateY(28px) rotate(-760deg); opacity:0;}
  }
  @keyframes ayoye{0%{opacity:0; transform:translateY(0) scale(.7);} 20%{opacity:1;} 100%{opacity:0; transform:translateY(-28px) scale(1.1);}}

  /* Poutine d'urgence */
  .poutine{position:fixed; left:50%; top:-150px; width:124px; height:120px; z-index:48; pointer-events:none;
    transform:translateX(-50%); animation:poutinedrop 2.8s cubic-bezier(.5,1.35,.5,1) forwards;}
  .poutine svg{width:100%; height:100%; display:block; filter:drop-shadow(0 6px 10px rgba(0,0,0,.5));}
  @keyframes poutinedrop{
    0%{transform:translate(-50%,0) rotate(-8deg);}
    32%{transform:translate(-50%,calc(36vh + 150px)) rotate(5deg);}
    42%{transform:translate(-50%,calc(31vh + 150px)) rotate(2deg);}
    52%{transform:translate(-50%,calc(36vh + 150px)) rotate(-2deg);}
    82%{transform:translate(-50%,calc(36vh + 150px)) rotate(0deg); opacity:1;}
    100%{transform:translate(-50%,calc(33vh + 150px)) scale(1.06); opacity:0;}
  }

  /* Badge niaiseux (toast) */
  .badge{position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px); z-index:60; pointer-events:none;
    background:linear-gradient(135deg,var(--flamme),var(--braise)); color:#fff; font-weight:800; font-size:13.5px;
    padding:11px 18px; border-radius:99px; box-shadow:0 10px 24px rgba(232,118,60,.42); opacity:0; max-width:88%;
    display:flex; align-items:center; gap:8px; text-align:center; line-height:1.3;}
  .badge.show{animation:badge 4.4s ease forwards;}
  @keyframes badge{0%{opacity:0; transform:translateX(-50%) translateY(20px);} 9%,82%{opacity:1; transform:translateX(-50%) translateY(0);} 100%{opacity:0; transform:translateX(-50%) translateY(20px);}}

  /* Tracteur & machinerie lourde */
  .machine{position:absolute; right:0; bottom:4px; width:98px; height:58px; z-index:6; pointer-events:none;
    transform:translateX(215px); animation:machine 5s linear forwards;
    filter:drop-shadow(0 3px 4px rgba(0,0,0,.45));}
  .machine svg{width:100%; height:100%; display:block;}
  .fumee{position:absolute; left:40%; top:2px; width:11px; height:11px; border-radius:50%; z-index:6; pointer-events:none;
    background:radial-gradient(circle, rgba(120,120,120,.6), transparent 70%); opacity:0; animation:fumee 1.5s ease-out forwards;}
  .machine .roue{transform-box:fill-box; transform-origin:center;}
  @media (prefers-reduced-motion: no-preference){
    .machine svg{animation:jolt .18s ease-in-out infinite; transform-origin:bottom center;}
    .machine .roue{animation:roue .85s linear infinite;}   /* les roues roulent pour vrai */
  }
  @keyframes machine{0%{transform:translateX(215px);} 100%{transform:translateX(-345px);}}
  @keyframes jolt{0%,100%{transform:translateY(0);} 50%{transform:translateY(-1.5px);}}
  @keyframes roue{to{transform:rotate(-360deg);}}
  @keyframes fumee{0%{opacity:0; transform:translate(0,0) scale(.5);} 20%{opacity:.7;} 100%{opacity:0; transform:translate(7px,-32px) scale(1.7);}}

  /* Bibittes qui trottinent + poussière + bouffées de puanteur */
  .gui.show{opacity:1 !important;}
  .dust{position:absolute; bottom:15px; width:11px; height:11px; border-radius:50%; z-index:5;
    background:radial-gradient(circle, rgba(180,170,150,.5), transparent 70%); opacity:0; pointer-events:none;
    animation:dust .6s ease-out forwards;}
  .stinkbit{position:absolute; width:11px; height:11px; border-radius:50%; z-index:6;
    background:radial-gradient(circle, rgba(172,222,92,.85), transparent 70%); opacity:0; pointer-events:none;
    animation:stinkbit 1.9s ease-out forwards;}
  @media (prefers-reduced-motion: no-preference){
    .raton svg, .mouf svg{transform-origin:bottom center; animation:waddle .3s ease-in-out infinite;}
    .mouf svg{animation-duration:.34s;}
  }
  @keyframes waddle{0%,100%{transform:translateY(0) rotate(-2.5deg);} 50%{transform:translateY(-2px) rotate(2.5deg);}}
  @keyframes dust{0%{opacity:.6; transform:translateY(0) scale(.5);} 100%{opacity:0; transform:translateY(-11px) scale(1.7);}}
  @keyframes stinkbit{0%{opacity:0; transform:translate(0,0) scale(.6);} 20%{opacity:.9;} 100%{opacity:0; transform:translate(var(--dx,-22px),-42px) scale(1.5);}}

  .compte b{display:inline-block;}
  .bump{animation:bump .45s cubic-bezier(.34,1.56,.64,1);}

  /* Ouverture adoucie des sections (déclenchée par JS au clic seulement) */
  @media (prefers-reduced-motion: no-preference){
    .catbody.anim{animation:bodyopen .3s ease;}
  }
  @keyframes bodyopen{0%{opacity:0; transform:translateY(-7px);} 100%{opacity:1; transform:translateY(0);}}

  /* Reflet qui coule dans la barre + lune et braise qui respirent (transform/opacity seulement: composité GPU) */
  .rail .railbar i{position:relative; overflow:hidden;}
  .rail .railbar i::after{content:""; position:absolute; top:0; bottom:0; left:0; width:46%;
    background:linear-gradient(90deg, transparent, rgba(255,246,220,.5), transparent);
    transform:translateX(-130%);}
  .moon::after{content:""; position:absolute; inset:-11px; border-radius:50%; pointer-events:none;
    background:radial-gradient(circle, rgba(251,212,106,.4), transparent 70%); opacity:0;}
  .moon.up::after{opacity:.5;}
  .bobpip{position:relative;}
  .bobpip::after{content:""; position:absolute; inset:-5px; border-radius:50%; pointer-events:none;
    background:radial-gradient(circle, rgba(244,169,61,.6), transparent 72%); opacity:.4;}
  /* pause des animations invisibles (étoiles éteintes, aurore absente, étincelles à feu mort) */
  .stars:not(.on) .star{animation-play-state:paused;}
  .aurora:not(.on){animation-play-state:paused;}
  .feu:not(.chaud) .spark{animation-play-state:paused;}
  @media (prefers-reduced-motion: no-preference){
    .rail .railbar i::after{animation:railshine 3.6s linear infinite;}
    .moon.up::after{animation:moonglow 5.2s ease-in-out infinite;}
    .bobpip::after{animation:pipflick 2.3s ease-in-out infinite;}
  }
  @keyframes railshine{0%{transform:translateX(-130%);} 100%{transform:translateX(360%);}}
  @keyframes moonglow{0%,100%{opacity:.35;} 50%{opacity:1;}}
  @keyframes pipflick{0%,100%{opacity:.35;} 50%{opacity:1;}}

  @media (prefers-reduced-motion: no-preference){
    .wisp{animation:wisp 3.4s ease-in infinite;}
    .w1{left:38%; animation-delay:0s;}
    .w2{left:56%; animation-delay:1.1s;}
    .w3{left:46%; animation-delay:2.2s;}
    .gui{animation:guibob 2.8s ease-in-out infinite;}
    .feu.pouf .flammes{animation:pouf .55s cubic-bezier(.22,1,.36,1);}
    .feu.pouf .glow{animation:glowpop .55s ease;}
    .feu.sputter .flammes{animation:sputter .45s ease;}
    .feu.fete .flammes{animation:roar 1s ease-in-out infinite;}
    .feu.fete{animation:party 1s ease-in-out infinite;}
  }

  @keyframes wisp{
    0%{opacity:0; transform:translate(-50%,0) scale(.6);}
    20%{opacity:.75;}
    100%{opacity:0; transform:translate(-50%,-72px) scale(1.35);}
  }
  @keyframes pouf{
    0%{transform:translateX(-50%) scaleY(1) scaleX(1);}
    28%{transform:translateX(-50%) scaleY(1.42) scaleX(1.12) translateY(-8px);}
    60%{transform:translateX(-50%) scaleY(.93) scaleX(1.04);}
    100%{transform:translateX(-50%) scaleY(1) scaleX(1);}
  }
  @keyframes sputter{
    0%,100%{transform:translateX(-50%) scaleY(1);}
    40%{transform:translateX(-50%) scaleY(.72) scaleX(1.05);}
  }
  @keyframes glowpop{0%,100%{transform:translateX(-50%) scale(1);} 30%{transform:translateX(-50%) scale(1.15); opacity:1;}}
  @keyframes guibob{0%,100%{transform:translateY(0) rotate(0);} 50%{transform:translateY(-3px) rotate(-3deg);}}
  @keyframes burst{
    0%{opacity:0; transform:translate(-50%,0) scale(1);}
    12%{opacity:1;}
    100%{opacity:0; transform:translate(calc(-50% + var(--dx,0px)), var(--dy,-80px)) scale(.3);}
  }
  @keyframes ember{
    0%{opacity:0; transform:translateY(0) translateX(0) scale(1);}
    15%{opacity:1;}
    100%{opacity:0; transform:translateY(-125px) translateX(var(--dx,0px)) scale(.4);}
  }
  @keyframes roar{0%,100%{transform:translateX(-50%) scaleY(1.06) scaleX(1.02);} 50%{transform:translateX(-50%) scaleY(1.2) scaleX(1.08);}}
  @keyframes party{0%,100%{transform:rotate(-1.6deg);} 50%{transform:rotate(1.6deg);}}
  @keyframes bump{0%{transform:scale(1);} 40%{transform:scale(1.55);} 100%{transform:scale(1);}}

  .etat{font-size:14px; color:var(--flamme); font-weight:700; margin:4px 0 0; letter-spacing:.4px; min-height:20px; transition:color .3s ease;}
  .compte{font-family:'Anton',sans-serif; font-size:30px; letter-spacing:1px; margin:2px 0 0; color:var(--toile);}
  .compte b{color:var(--braise);}
  .compte small{font-family:'Hanken Grotesk',sans-serif; font-weight:600; font-size:14px; color:var(--cendre); letter-spacing:0;}

  /* Petit Bob, le commentateur officiel du camping */
  .bob{
    display:flex; align-items:flex-start; gap:9px; margin:14px auto 2px; max-width:430px;
    text-align:left; cursor:pointer; font-family:inherit; color:var(--toile);
    background:rgba(239,230,211,.06); border:1px solid rgba(239,230,211,.1);
    border-radius:14px; padding:11px 14px; transition:background .15s ease, transform .08s ease;
  }
  .bob:hover{background:rgba(239,230,211,.1);}
  .bob:active{transform:scale(.99);}
  .bob:focus-visible{outline:3px solid var(--ciel); outline-offset:2px;}
  .bobpip{flex:0 0 auto; width:16px; height:16px; margin-top:2px; border-radius:50% 50% 50% 0;
    transform:rotate(45deg);
    background:radial-gradient(circle at 60% 60%, var(--or), var(--braise) 70%);
    box-shadow:0 0 8px rgba(244,169,61,.55);}
  .bobtxt{flex:1; font-size:13.5px; line-height:1.4; color:var(--cendre);}
  .bobtxt b{color:var(--flamme); font-weight:800; letter-spacing:.2px;}
  #bobmot{transition:opacity .2s ease;}

  /* Catégories */
  .cat{
    background:linear-gradient(180deg, var(--toile) 0%, var(--toile-2) 100%);
    color:var(--encre);
    border-radius:18px; margin:14px 0; overflow:hidden;
    box-shadow:var(--ombre);
    border:1px solid rgba(33,51,42,.06);
  }
  .cathead{
    width:100%; border:0; background:transparent; cursor:pointer;
    display:flex; align-items:center; gap:12px; text-align:left;
    padding:15px 16px; font-family:inherit; color:inherit;
  }
  .ic{flex:0 0 auto; width:34px; height:34px; border-radius:10px;
    display:grid; place-items:center; background:rgba(232,118,60,.14); color:var(--braise);}
  .ic svg{width:20px; height:20px;}
  .cattitle{flex:1; min-width:0;}
  .cattitle .nom{font-weight:800; font-size:16px; letter-spacing:.2px;}
  .cattitle .mini{display:flex; align-items:center; gap:8px; margin-top:5px;}
  .cattitle .minibar{flex:1; height:4px; border-radius:99px; background:rgba(33,51,42,.12); overflow:hidden; max-width:160px;}
  .cattitle .minibar i{display:block; height:100%; width:0; background:var(--braise); border-radius:99px; transition:width .4s ease;}
  .cattitle .frac{font-size:12px; font-weight:700; color:#6f7d70; white-space:nowrap; font-variant-numeric:tabular-nums;}
  .chev{flex:0 0 auto; width:22px; height:22px; color:#8a9789; transition:transform .3s ease;}
  .cat[open] .chev, .cat.ouvert .chev{transform:rotate(180deg);}

  .catbody{padding:0 10px 8px;}
  .cat:not(.ouvert) .catbody{display:none;}

  .item{
    display:flex; align-items:flex-start; gap:13px;
    padding:11px 8px; border-radius:12px; cursor:pointer;
    min-height:46px; position:relative;
    transition:background .15s ease;
  }
  .item:hover{background:rgba(33,51,42,.04);}
  .item input{position:absolute; opacity:0; width:1px; height:1px;}
  .box{
    flex:0 0 auto; width:24px; height:24px; margin-top:1px; border-radius:8px;
    border:2px solid #b9ac8f; background:#fff; position:relative;
    display:grid; place-items:center; transition:all .18s ease;
  }
  @media (prefers-reduced-motion: no-preference){
    .box.pop{animation:boxpop .38s cubic-bezier(.34,1.56,.64,1);}
    .box.pop::after{content:""; position:absolute; inset:-7px; border-radius:13px;
      border:2px solid var(--braise); opacity:0; animation:boxring .5s ease-out;}
  }
  @keyframes boxpop{0%{transform:scale(1);} 45%{transform:scale(1.28) rotate(4deg);} 100%{transform:scale(1) rotate(0);}}
  @keyframes boxring{0%{opacity:.8; transform:scale(.7);} 100%{opacity:0; transform:scale(1.15);}}
  .box svg{width:15px; height:15px; stroke:#fff; stroke-width:3.5; fill:none;
    stroke-linecap:round; stroke-linejoin:round; stroke-dasharray:24; stroke-dashoffset:24; transition:stroke-dashoffset .25s ease;}
  .item input:checked + .box{background:linear-gradient(135deg, var(--flamme), var(--braise)); border-color:var(--braise);}
  .item input:checked + .box svg{stroke-dashoffset:0;}
  .item input:focus-visible + .box{outline:3px solid var(--ciel); outline-offset:2px;}
  .txt{flex:1; min-width:0;}
  .txt .nm{font-size:15.5px; font-weight:600; transition:color .2s ease;}
  .txt .nt{font-size:12.5px; color:#7c8a7d; margin-top:1px;}
  .item input:checked ~ .txt .nm{color:#a9b0a4; text-decoration:line-through; text-decoration-color:rgba(169,176,164,.7);}
  .del{flex:0 0 auto; border:0; background:transparent; color:#bcae93; cursor:pointer;
    width:28px; height:28px; border-radius:8px; font-size:18px; line-height:1; align-self:center;}
  .del:hover{background:rgba(33,51,42,.06); color:var(--braise);}
  .edit{flex:0 0 auto; border:0; background:transparent; color:#bcae93; cursor:pointer;
    width:28px; height:28px; border-radius:8px; font-size:15px; line-height:1; align-self:center;}
  .edit:hover{background:rgba(33,51,42,.06); color:var(--ciel);}
  .cmt{flex:0 0 auto; border:0; background:transparent; cursor:pointer; opacity:.55;
    width:28px; height:28px; border-radius:8px; font-size:14px; line-height:1; align-self:center;}
  .cmt:hover{background:rgba(33,51,42,.06); opacity:1;}
  .usernote{display:block; font-size:12.5px; color:var(--braise); margin-top:3px; line-height:1.35;
    padding-left:9px; border-left:2px solid rgba(232,118,60,.45); font-style:italic; word-break:break-word;}

  .ajout{display:flex; gap:8px; padding:8px 8px 6px;}
  .ajout input{
    flex:1; min-width:0; border:1.5px dashed #c7b998; background:rgba(255,255,255,.5);
    border-radius:10px; padding:10px 12px; font-family:inherit; font-size:14.5px; color:var(--encre);
  }
  .ajout input::placeholder{color:#9aa890;}
  .ajout input:focus{outline:none; border-color:var(--braise); border-style:solid; background:#fff;}
  .ajout button{
    flex:0 0 auto; border:0; border-radius:10px; padding:0 16px; cursor:pointer;
    background:var(--encre); color:var(--toile); font-family:inherit; font-weight:700; font-size:14px;
  }
  .ajout button:active{transform:scale(.97);}

  /* Pied */
  .pied{display:flex; flex-direction:column; align-items:center; gap:13px; margin-top:28px;}
  .pdf{
    border:0; border-radius:99px; padding:14px 30px; cursor:pointer;
    font-family:inherit; font-weight:800; font-size:15px; color:#fff; letter-spacing:.2px;
    background:linear-gradient(135deg, var(--flamme), var(--braise));
    box-shadow:0 10px 24px rgba(232,118,60,.32);
    display:flex; align-items:center; gap:9px;
  }
  .pdf:hover{filter:brightness(1.04);}
  .pdf:active{transform:scale(.97);}
  .pdf svg{width:18px; height:18px;}
  .reset{
    border:1.5px solid rgba(239,230,211,.25); background:transparent; color:var(--cendre);
    border-radius:99px; padding:11px 22px; cursor:pointer; font-family:inherit; font-weight:700; font-size:14px;
    display:flex; align-items:center; gap:8px;
  }
  .reset:hover{border-color:var(--braise); color:var(--flamme);}
  .install{
    border:1.5px solid var(--ciel); background:rgba(123,160,174,.12); color:var(--toile);
    border-radius:99px; padding:12px 24px; cursor:pointer; font-family:inherit; font-weight:800; font-size:14.5px;
    display:flex; align-items:center; gap:9px; letter-spacing:.2px;
  }
  .install:hover{background:rgba(123,160,174,.22); border-color:var(--or);}
  .install:active{transform:scale(.97);}
  .install svg{width:18px; height:18px;}
  .installtip{max-width:430px; text-align:center; color:var(--cendre); font-size:13px; line-height:1.4;
    background:rgba(239,230,211,.06); border:1px solid rgba(239,230,211,.1); border-radius:12px; padding:10px 14px;}
  .installtip b{color:var(--flamme);}
  .confirm{display:flex; gap:8px; align-items:center; color:var(--cendre); font-size:14px; font-weight:600;}
  .confirm button{border-radius:99px; padding:9px 18px; border:0; cursor:pointer; font-family:inherit; font-weight:700; font-size:14px;}
  .confirm .oui{background:var(--braise); color:#fff;}
  .confirm .non{background:rgba(239,230,211,.14); color:var(--toile);}

  .note{text-align:center; color:rgba(157,170,156,.6); font-size:12px; margin-top:18px;}

  /* Document PDF / impression */
  #printDoc{ display:none; }
  @media print{
    .rail, .wrap{ display:none !important; }
    #printDoc{ display:block; color:#1d1d1b; }
    html, body{ background:#fff !important; background-image:none !important; }
    body{ font-family:'Hanken Grotesk', system-ui, sans-serif; }
    @page{ margin:14mm 15mm 15mm; }

    .pd-head{ border-bottom:2.5px solid #1E3A2C; padding-bottom:10px; margin-bottom:14px; }
    .pd-title{ font-family:'Anton', sans-serif; font-weight:400; text-transform:uppercase;
      letter-spacing:.5px; color:#1E3A2C; font-size:26pt; line-height:1; margin:0; }
    .pd-sub{ color:#5a5a52; font-size:11pt; margin-top:5px; }
    .pd-meta{ color:#7a7a70; font-size:9.5pt; margin-top:7px; }

    .pd-cat{ break-inside:avoid; page-break-inside:avoid; margin-top:13px; }
    .pd-cat h2{ font-size:12.5pt; font-weight:800; color:#1E3A2C; margin:0 0 5px;
      padding-bottom:3px; border-bottom:1px solid #d8d8d0; }
    .pd-frac{ font-weight:600; color:#9a9a90; font-size:10pt; }

    .pd-row{ display:flex; gap:9px; align-items:flex-start; padding:3.5px 0;
      break-inside:avoid; page-break-inside:avoid; font-size:10.5pt; }
    .pd-box{ flex:0 0 auto; width:13px; height:13px; border:1.4px solid #555; border-radius:3px;
      margin-top:1.5px; display:grid; place-items:center; }
    .pd-box.on{ border-color:#1E3A2C; background:#fbe7da;
      -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    .pd-box svg{ width:11px; height:11px; }
    .pd-txt{ flex:1; }
    .pd-nm{ color:#1d1d1b; }
    .pd-note{ color:#8a8a80; font-size:9pt; }

    .pd-foot{ margin-top:18px; padding-top:8px; border-top:1px solid #e2e2da;
      color:#a5a59a; font-size:8.5pt; text-align:center; }
  }
</style>
</head>
<body>

  <div class="sky" id="sky" aria-hidden="true"></div>
  <div class="aurora" id="aurora" aria-hidden="true"></div>
  <div class="stars" id="stars" aria-hidden="true"></div>
  <svg class="constel" id="constel" viewBox="0 0 80 70" aria-hidden="true">
    <g stroke="rgba(255,246,220,.35)" stroke-width="1" fill="none">
      <path d="M40 8 L14 58 L66 58 L40 8 Z"/>
      <path d="M40 8 L40 58"/>
    </g>
    <g fill="#fff6dc">
      <circle cx="40" cy="8" r="1.9"/><circle cx="14" cy="58" r="1.9"/><circle cx="66" cy="58" r="1.9"/>
      <circle cx="40" cy="58" r="1.6"/><circle cx="27" cy="33" r="1.4"/><circle cx="53" cy="33" r="1.4"/>
    </g>
  </svg>
  <button class="moon" id="moon" type="button" title="Fais un vœu" aria-label="Fais un vœu"></button>

  <div class="rail">
    <span class="minifeu" id="minifeu" aria-hidden="true"><i class="minipip"></i><i class="mflame mf1"></i><i class="mflame mf2"></i></span>
    <div class="railbar"><i id="railFill"></i></div>
    <span class="railpct" id="railPct">0%</span>
  </div>

  <div class="wrap">
    <header class="hero">
      <p class="eyebrow">La liste avant de partir</p>
      <h1>Camping<br>en tente</h1>
      <p class="sous">Camping d'été en terrain aménagé, avec les deux flos. Coche, le feu va pogner.</p>

      <div class="feu" id="feu">
        <div class="glow"></div>
        <div class="smoke"><span class="wisp w1"></span><span class="wisp w2"></span><span class="wisp w3"></span></div>
        <span class="spark s1"></span><span class="spark s2"></span><span class="spark s3"></span>
        <span class="spark s4"></span><span class="spark s5"></span>
        <div class="flammes">
          <div class="flamme f1"></div>
          <div class="flamme f2"></div>
          <div class="flamme f3"></div>
        </div>
        <div class="buche b1"></div>
        <div class="buche b2"></div>
        <div class="gui" aria-hidden="true"><span class="stick"></span><span class="mallow"></span></div>
      </div>

      <p class="etat" id="etat">Le feu est pas encore pogné</p>
      <p class="compte"><b id="nFait">0</b> <small>/ <span id="nTotal">0</span> items rangés</small></p>
      <p class="rang" id="rang"></p>
      <div class="bines hide" id="bines">
        <span>💨 Baromètre de bines</span>
        <span class="binesbar"><i id="binesFill"></i></span>
        <span class="binesniv" id="binesNiv"></span>
      </div>

      <div class="zoo">
        <button class="zoobtn" id="callRaton" type="button">🦝 Appeler le raton</button>
        <button class="zoobtn" id="callMouf" type="button">🦨 Appeler la moufette</button>
        <button class="zoobtn" id="callMachine" type="button">🚜 Machinerie</button>
      </div>
      <p class="vols hide" id="vols"></p>

      <button class="bob" id="bob" type="button" title="Tape pour une autre niaiserie de Petit Bob">
        <span class="bobpip" aria-hidden="true"></span>
        <span class="bobtxt"><b>Petit Bob :</b> <span id="bobmot">prépare son sac depuis trois jours. Il a mis une roche pis rien d'autre.</span></span>
      </button>
    </header>

    }catch(e){ /* première ouverture ou stockage indispo: on garde le défaut */ }

  function cardStats(){

    for(var i=0;i<RANGS.length;i++){ if(p >= RANGS[i].p) rang = RANGS[i].nom; }

    for(var j=0;j<BINES.length;j++){ if(r >= BINES[j].p) niv = BINES[j].niv; }
    return { done:t.done, tot:t.tot, pct:Math.round(p*100), rang:rang,
      vols:state.vols||0, voeux:state.voeux||0, bines:(r>0?niv:'Pas encore') };
  }
  function spacedText(ctx, txt, cx, y, sp){
    var w=0, i;
    for(i=0;i<txt.length;i++){ w += ctx.measureText(txt[i]).width + sp; }
    w -= sp;
    var x = cx - w/2, prev = ctx.textAlign; ctx.textAlign = 'left';
    for(i=0;i<txt.length;i++){ ctx.fillText(txt[i], x, y); x += ctx.measureText(txt[i]).width + sp; }
    ctx.textAlign = prev;
  }
  function drawFlame(ctx, cx, by, sc){
    ctx.save();
    var rg = ctx.createRadialGradient(cx, by-70*sc, 8, cx, by-70*sc, 170*sc);
    rg.addColorStop(0,'rgba(244,169,61,.55)'); rg.addColorStop(1,'rgba(244,169,61,0)');
    ctx.fillStyle = rg; ctx.beginPath(); ctx.arc(cx, by-70*sc, 170*sc, 0, 7); ctx.fill();
    function flame(w,h,col){
      ctx.beginPath(); ctx.moveTo(cx,by);
      ctx.bezierCurveTo(cx-w, by-h*0.4, cx-w*0.5, by-h*0.92, cx, by-h);
      ctx.bezierCurveTo(cx+w*0.5, by-h*0.92, cx+w, by-h*0.4, cx, by);
      ctx.fillStyle = col; ctx.fill();
    }
    flame(74*sc,190*sc,'#c4421f'); flame(50*sc,148*sc,'#e8763c');
    flame(31*sc,100*sc,'#F4A93D'); flame(16*sc,58*sc,'#FBD46A');
    ctx.fillStyle = '#5a3a24';
    ctx.save(); ctx.translate(cx, by+8); ctx.rotate(-0.28); ctx.fillRect(-74*sc,-9*sc,148*sc,18*sc); ctx.restore();
    ctx.save(); ctx.translate(cx, by+8); ctx.rotate(0.28); ctx.fillRect(-74*sc,-9*sc,148*sc,18*sc); ctx.restore();
    ctx.restore();
  }
  function drawCardInto(ctx, W, H){
    var s = cardStats();
    var g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#12203a'); g.addColorStop(.42,'#3a2a45'); g.addColorStop(.72,'#7a3b2f'); g.addColorStop(1,'#e8763c');
    ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#fff6dc';
    for(var i=0;i<44;i++){ ctx.globalAlpha = 0.15 + ((i*7)%10)/22; ctx.beginPath();
      ctx.arc((i*151)%W, (i*97)%Math.round(H*0.42), 1.7, 0, 7); ctx.fill(); }
    ctx.globalAlpha = 1;
    drawFlame(ctx, W/2, H*0.34, 1.0);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#7BA0AE'; ctx.font = '700 30px "Hanken Grotesk", system-ui, sans-serif';
    spacedText(ctx, 'BILAN DE CAMP', W/2, 92, 8);
    ctx.fillStyle = '#EFE6D3'; ctx.font = '400 94px Anton, "Hanken Grotesk", sans-serif';
    ctx.fillText('CAMPING', W/2, 188); ctx.fillText('EN TENTE', W/2, 280);
    ctx.fillStyle = '#F4A93D'; ctx.font = '400 132px Anton, "Hanken Grotesk", sans-serif';
    ctx.fillText(s.pct + '%', W/2, H*0.50);
    ctx.fillStyle = '#EFE6D3'; ctx.font = '600 34px "Hanken Grotesk", system-ui, sans-serif';
    ctx.fillText(s.done + ' / ' + s.tot + ' items rangés', W/2, H*0.50 + 52);
    ctx.fillStyle = '#FBD46A'; ctx.font = '800 30px "Hanken Grotesk", system-ui, sans-serif';
    spacedText(ctx, 'RANG : ' + s.rang.toUpperCase(), W/2, H*0.50 + 112, 2);
    var rows = [
      ['🦝  Guimauves volées', String(s.vols)],
      ['💫  Vœux faits à la lune', String(s.voeux)],
      ['💨  Niveau de bines', s.bines]
    ];
    var y = H*0.66, lineH = 78, k;
    for(k=0;k<rows.length;k++){
      var ry = y + k*lineH;
      ctx.textAlign = 'left'; ctx.fillStyle = '#EFE6D3'; ctx.font = '600 34px "Hanken Grotesk", system-ui, sans-serif';
      ctx.fillText(rows[k][0], W*0.11, ry);
      ctx.textAlign = 'right'; ctx.fillStyle = '#F4A93D'; ctx.font = '800 34px "Hanken Grotesk", system-ui, sans-serif';
      ctx.fillText(rows[k][1], W*0.89, ry);
    }
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(239,230,211,.9)'; ctx.font = 'italic 600 29px "Hanken Grotesk", system-ui, sans-serif';
    ctx.fillText('« Bilan approuvé par Petit Bob. »', W/2, H*0.90);
    ctx.fillStyle = 'rgba(255,246,220,.65)'; ctx.font = '600 24px "Hanken Grotesk", system-ui, sans-serif';
    ctx.fillText('frankyray21.github.io/checklist-camping', W/2, H-64);
  }

  // --- Partage de la liste par lien (2 appareils) ---
  function b64enc(str){ return btoa(unescape(encodeURIComponent(str))); }
  function b64dec(str){ return decodeURIComponent(escape(atob(str))); }
  function copyLink(link){
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(link)
        .then(function(){ showBadge('🔗 Lien copié ! Envoie-le à ta partenaire.'); })
        .catch(function(){ window.prompt('Copie ce lien :', link); });

  function shareLink(){
    var subset = { checked:state.checked, custom:state.custom, removed:state.removed, edits:state.edits, notes:state.notes };
    var enc;
    try{ enc = b64enc(JSON.stringify(subset)); }catch(e){ return; }
    var link = location.origin + location.pathname + '#l=' + enc;
    if(navigator.share){
      navigator.share({ title:'Notre liste de camping', text:'Notre liste de camping 🏕️🔥', url:link })
        .catch(function(){ copyLink(link); });
    } else { copyLink(link); }
  }
  // Applique une liste partagée déjà décodée (venant d'un lien #l= ou collée à la main)
  function applySharedPayload(data){
    if(!data) return false;
    var ok = window.confirm('Charger la liste de camping partagée ? Ça remplace ta liste actuelle sur cet appareil.');
    if(!ok) return false;
    // horodate tout ce qui change (avant ET après), pour que la fusion du camp adopte cette liste
    var stamp = {};
    [state.checked, state.removed, state.edits, state.notes,
     data.checked||{}, data.removed||{}, data.edits||{}, data.notes||{}].forEach(function(m){
      Object.keys(m).forEach(function(k){ stamp[k] = 1; });
    });
    [state.custom, data.custom||{}].forEach(function(c){
      for(var cid in c){ (c[cid]||[]).forEach(function(x){ stamp[x.id] = 1; }); }
    });
    if(data.checked) state.checked = data.checked;
    if(data.custom) state.custom = data.custom;
    if(data.removed) state.removed = data.removed;
    if(data.edits) state.edits = data.edits;
    if(data.notes) state.notes = data.notes;
    var now = Date.now();
    if(!state.mods) state.mods = {};
    Object.keys(stamp).forEach(function(k){ state.mods[k] = now; });
    save(); render();
    if(campId){
      clearTimeout(pushT);  // évite un 2e envoi identique programmé par save() juste avant
      showBadge('🏕️ Liste chargée. Envoi au camp…');
      pushCamp(function(ok){  // diffusion immédiate (gagne la course contre le pull initial),
        showBadge(ok           // et on confirme pour de vrai, pas juste "envoyé" à l'aveugle
          ? '📡 Envoyé au camp avec succès !'
          : '⚠️ Chargé sur cet appareil, mais l’envoi au camp a échoué (réseau).');
      });
    } else {
      showBadge('🏕️ Liste partagée chargée !');
    }
    return true;
  }

  function decodeSharedCode(code){

  }

  }

  function campPayload(){
    return { list:{ checked:state.checked, custom:state.custom, removed:state.removed, edits:state.edits, notes:state.notes }, mods: state.mods || {}, ts: Date.now(), nom: campLabel };

  // Fusion item par item avec l'autre appareil: pour chaque item, la modification
  // la plus récente gagne. Personne n'écrase plus la liste au complet de l'autre.
  function setMergedField(map, id, val){
    if(val === undefined || val === null || val === false || val === ''){ delete map[id]; }
    else map[id] = val;
  }
  function mergeRemoteCamp(data){
    var rl = data.list || {};
    var rm = data.mods || {};
    if(!state.mods) state.mods = {};
    var lm = state.mods;
    var changed = false, localNewer = false;
    var ids = {};
    Object.keys(rm).forEach(function(k){ ids[k] = 1; });
    Object.keys(lm).forEach(function(k){ ids[k] = 1; });
    function remoteCustomDef(id){
      var rc = rl.custom || {};
      for(var cid in rc){
        var arr = rc[cid] || [];
        for(var i=0;i<arr.length;i++){ if(arr[i].id === id) return { catId: cid, it: arr[i] }; }
      }
      return null;
    }
    function localCustomDef(id){
      for(var cid in state.custom){
        var arr = state.custom[cid] || [];
        for(var i=0;i<arr.length;i++){ if(arr[i].id === id) return arr[i]; }
      }
      return null;
    }
    Object.keys(ids).forEach(function(id){
      var rts = rm[id] || 0, lts = lm[id] || 0;
      if(rts > lts){
        setMergedField(state.checked, id, (rl.checked || {})[id]);
        setMergedField(state.removed, id, (rl.removed || {})[id]);
        setMergedField(state.edits,   id, (rl.edits   || {})[id]);
        setMergedField(state.notes,   id, (rl.notes   || {})[id]);
        var rdef = remoteCustomDef(id);
        if(rdef){
          var ldef = localCustomDef(id);
          if(ldef){ ldef.nm = rdef.it.nm; }
          else {
            if(!state.custom[rdef.catId]) state.custom[rdef.catId] = [];
            state.custom[rdef.catId].push({ id: id, nm: rdef.it.nm });
          }
        }
        lm[id] = rts;
        changed = true;
      } else if(lts > rts){
        localNewer = true;
      }
    });
    return { changed: changed, localNewer: localNewer };
  }
  function schedulePush(){
    if(!campId || applyingRemote) return;

  function pushCamp(onDone){
    if(!campId){ if(onDone) onDone(false); return; }
    var payload = campPayload();
    fetch(CAMP_BIN(campId), { method:'PUT',
      headers:{ 'Content-Type':'application/json' },
      body:JSON.stringify(payload) })
      .then(function(res){
        if(!res.ok) throw new Error('http ' + res.status);
        campTs = payload.ts;
        pushFailNotified = false;
        noteCampStatus(true);
        if(onDone) onDone(true);
      })
      .catch(function(){
        if(!pushFailNotified){
          pushFailNotified = true;
          showBadge('⚠️ Le camp partagé n’a pas reçu tes changements (réseau). On réessaiera.');
        }

  function pullCamp(){
    if(!campId || document.hidden) return;
    fetch(CAMP_BIN(campId), { cache:'no-store' })
      .then(function(r){ if(!r.ok) throw new Error('http ' + r.status); return r.json(); })
      .then(function(data){
        pullFailNotified = false;
        noteCampStatus(true);
        if(data && typeof data.nom === 'string' && data.nom !== campLabel){
          campLabel = data.nom;

            if(campLabel) window.localStorage.setItem(CAMPLABELKEY, campLabel);
            else window.localStorage.removeItem(CAMPLABELKEY);
          }catch(e){}
          updateCampLabelDisplay();
        }
        if(!data) return;
        // si t'es en train d'écrire, on n'écrase pas ton champ: on réessaie au prochain tour
        var ae = document.activeElement;
        if(ae && ae.tagName === 'INPUT' && ae.type === 'text') return;
        if(data.mods){
          // nouveau format: fusion item par item, la modif la plus récente gagne pour CHAQUE item
          var r = mergeRemoteCamp(data);
          if(data.ts && data.ts > campTs) campTs = data.ts;
          if(r.changed){ applyingRemote = true; persistLocalRaw(); render(); applyingRemote = false; }

          campTs = data.ts; applyRemoteList(data.list);
        }
      })
      .catch(function(){
        if(!pullFailNotified){
          pullFailNotified = true;

  function buildItem(cat, it, isCustom){

    // Modifier le texte de l'item (d\u00E9j\u00E0 l\u00E0 ou personnalis\u00E9)
    var edit = el('button','edit','\u270E');

    var del = el('button','del','\u00D7');

      ev.preventDefault(); ev.stopPropagation();
      // item de base ou personnalis\u00E9: tout passe par la corbeille (r\u00E9cup\u00E9rable)
      state.removed[it.id] = true;
      delete state.checked[it.id];
      touch(it.id);
      save(); render();
    });
    row.appendChild(del);

  function findItemMeta(id){
    for(var i=0;i<DATA.length;i++){
      var cat = DATA[i];
      for(var j=0;j<cat.items.length;j++){
        if(cat.items[j].id === id) return { cat:cat, it:cat.items[j] };
      }
    }
    // items personnalisés (ajoutés à la main), maintenant récupérables eux aussi
    for(var cid in state.custom){
      var arr = state.custom[cid] || [];
      for(var k=0;k<arr.length;k++){
        if(arr[k].id === id){
          var pcat = null;
          for(var m=0;m<DATA.length;m++){ if(DATA[m].id === cid){ pcat = DATA[m]; break; } }
          return { cat: pcat || { nom:'Perso' }, it: arr[k] };
        }
      }
    }
    return null;
  }

  function genererPDF(){
    var t = totals();
    var reste = t.tot - t.done;
    var dateStr = new Date().toLocaleDateString('fr-CA', { day:'numeric', month:'long', year:'numeric' });

    var PW=612, PH=792, ML=54, MR=54, MB=54;
    var CW = PW-ML-MR;
    var top = PH-54;

    var green='0.118 0.227 0.176';
    var ink='0.114 0.114 0.106';
    var grey='0.48 0.48 0.44';
    var greyL='0.62 0.62 0.56';
    var ruleL='0.85 0.85 0.82';

    var pages=[];
    var buf=[];
    var y=top;
    var pageNum=0;

    function f(n){ return Math.round(n*100)/100; }
    function tw(str, fs){ return String(str).length * fs * 0.52; }
    function enc(str){
      str=String(str);
      var out='';
      for(var i=0;i<str.length;i++){
        var ch=str[i], code=str.charCodeAt(i);
        if(code===0x2019||code===0x2018) ch="'";
        else if(code===0x201C||code===0x201D) ch='"';
        else if(code===0x2013||code===0x2014) ch='-';
        else if(code===0x2026) ch='...';
        code=ch.charCodeAt(0);
        if(ch.length===1 && code>255) ch='?';
        var e='';
        for(var j=0;j<ch.length;j++){
          var c=ch[j];
          if(c==='('||c===')'||c==='\\') e+='\\'+c; else e+=c;
        }
        out+=e;
      }
      return out;
    }
    function text(str, x, yb, fs, font, color){
      buf.push('BT /'+font+' '+fs+' Tf '+color+' rg 1 0 0 1 '+f(x)+' '+f(yb)+' Tm ('+enc(str)+') Tj ET');
    }
    function rule(x1, yy, x2, color, wd){
      buf.push(color+' RG '+(wd||1)+' w '+f(x1)+' '+f(yy)+' m '+f(x2)+' '+f(yy)+' l S');
    }
    function box(x, yb, on){
      var s=10;
      buf.push((on?green:'0.33 0.33 0.33')+' RG 1.2 w '+f(x)+' '+f(yb)+' '+s+' '+s+' re S');
      if(on){
        buf.push(green+' RG 1.6 w '+f(x+2)+' '+f(yb+5)+' m '+f(x+4)+' '+f(yb+2.5)+' l '+f(x+8)+' '+f(yb+8)+' l S');
      }
    }
    function footer(){
      rule(ML, MB+10, PW-MR, ruleL, 0.8);
      text('Liste de camping  ·  '+dateStr, ML, MB, 8, 'F1', greyL);
      var pn='Page '+(pageNum+1);
      text(pn, PW-MR-tw(pn,8), MB, 8, 'F1', greyL);
    }
    function finalizePage(){
      footer();
      pages.push(buf.join('\n'));
      buf=[];
      pageNum++;
    }
    function ensure(h){
      if(y - h < MB + 24){ finalizePage(); y=top; }
    }

    text('LISTE DE CAMPING EN TENTE', ML, y-18, 22, 'F2', green); y-=26;
    text('Été, terrain aménagé, avec les deux flos', ML, y-2, 10.5, 'F1', grey); y-=15;
    text('Préparée le '+dateStr+'    ·    '+t.done+' rangés sur '+t.tot+'    ·    '+reste+' encore à prendre', ML, y-2, 9, 'F1', greyL); y-=12;
    rule(ML, y, PW-MR, green, 1.5); y-=18;

    DATA.forEach(function(cat){
      var ct=catTotals(cat);
      ensure(34);
      text(cat.nom, ML, y-11, 12.5, 'F2', green);
      text('('+ct.done+'/'+ct.tot+')', ML+tw(cat.nom,12.5)+8, y-11, 9.5, 'F1', greyL);
      y-=15;
      rule(ML, y, PW-MR, ruleL, 0.8);
      y-=12;
      allItems(cat).forEach(function(it){
        var on=!!state.checked[it.id];
        var nm=itemName(it), note=it.nt||'';
        var un3 = state.notes && state.notes[it.id];
        if(un3) note = note ? (note + '   ·   ' + un3) : un3;
        var sep='   ·   ';
        var sameW = tw(nm,10) + (note? tw(sep+note,9) : 0);
        var wrap = note && (16 + sameW > CW);
        var rowH = wrap? 23 : 15;
        ensure(rowH);
        var baseY = y-9;
        box(ML, y-10.5, on);
        text(nm, ML+16, baseY, 10, 'F1', ink);
        if(note && !wrap){
          text(sep+note, ML+16+tw(nm,10), baseY, 9, 'F1', grey);
        }
        if(wrap){
          text(note, ML+16, baseY-12, 9, 'F1', grey);
          y-=23;
        } else {
          y-=15;
        }
      });
      y-=8;
    });
    finalizePage();

    var fontH='<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica /Encoding /WinAnsiEncoding >>';
    var fontB='<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold /Encoding /WinAnsiEncoding >>';
    var allObjs=[];
    allObjs[1]='<< /Type /Catalog /Pages 2 0 R >>';
    allObjs[3]=fontH;
    allObjs[4]=fontB;
    var num=5, pageNums=[];
    for(var i=0;i<pages.length;i++){
      var pnum=num++, cnum=num++;
      pageNums.push(pnum);
      allObjs[pnum]='<< /Type /Page /Parent 2 0 R /MediaBox [0 0 612 792] /Resources << /Font << /F1 3 0 R /F2 4 0 R >> >> /Contents '+cnum+' 0 R >>';
      var stream=pages[i];
      allObjs[cnum]='<< /Length '+stream.length+' >>\nstream\n'+stream+'\nendstream';
    }
    var kids=pageNums.map(function(n){return n+' 0 R';}).join(' ');
    allObjs[2]='<< /Type /Pages /Kids ['+kids+'] /Count '+pages.length+' >>';

    var pdf='%PDF-1.4\n%\xE2\xE3\xCF\xD3\n';
    var offsets=[];
    for(var n=1;n<allObjs.length;n++){
      offsets[n]=pdf.length;
      pdf += n+' 0 obj\n'+allObjs[n]+'\nendobj\n';
    }
    var xrefStart=pdf.length;
    var count=allObjs.length;
    pdf+='xref\n0 '+count+'\n';
    pdf+='0000000000 65535 f \n';
    for(var n2=1;n2<count;n2++){
      pdf+=('0000000000'+offsets[n2]).slice(-10)+' 00000 n \n';
    }
    pdf+='trailer\n<< /Size '+count+' /Root 1 0 R >>\nstartxref\n'+xrefStart+'\n%%EOF';

    var bytes=new Uint8Array(pdf.length);
    for(var k=0;k<pdf.length;k++) bytes[k]=pdf.charCodeAt(k)&0xFF;
    var blob=new Blob([bytes], {type:'application/pdf'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url; a.download='liste-camping.pdf';
    document.body.appendChild(a); a.click();
    setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); }, 1500);
  }

      var codeEl = el('p','campcode');
      codeEl.id = 'campCode';
      codeEl.style.cssText = 'font-size:11px; margin:2px 0 0; color:var(--cendre); font-family:monospace; letter-spacing:.5px; cursor:pointer; text-decoration:underline dotted;';
      codeEl.title = 'Touche ici pour donner un petit nom à ce camp';
      codeEl.textContent = campLabel
        ? 'Camp : ' + campLabel + ' (code : ' + campId + ')'
        : 'Code du camp (compare-le sur les 2 appareils, ou touche ici pour le nommer) : ' + campId;
      codeEl.addEventListener('click', renameCamp);
      pied.appendChild(codeEl);
    }

    var inst = makeInstallControl();
    if(inst) pied.appendChild(inst);

    var nRem = removedCount();
    if(nRem > 0){
      var reb = el('button','reset',
        '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2"/><path d="M19 6l-1 14a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1L5 6"/></svg> 🗑️ Corbeille ('+nRem+')');
      reb.type='button';
      reb.addEventListener('click', openTrash);
      pied.appendChild(reb);
    }

    pied.appendChild(btn);
  }

  window.addEventListener('beforeprint', buildPrintDoc);

  function etatTexte(p){
    if(p<=0) return 'Le feu est pas encore pogné';
    if(p<0.34) return 'Ça commence à brûler';
    if(p<0.67) return 'Le feu prend ben comme faut';
    if(p<1) return 'Belle attisée, presque là';
    return 'Tout est rangé. Même Petit Bob est impressionné\u00A0!';
  }

  // --- Réactions du feu (le feu vit selon la checklist) ---
  var motionOK = true;
  try{ motionOK = !window.matchMedia || window.matchMedia('(prefers-reduced-motion: no-preference)').matches; }catch(e){ motionOK = true; }
  var prevDone = null;
  var feteTimer = null;
  var feteStopT = null;
  var curFire = 0;
  var raccoonBusy = false;
  var raccoonTimer = null;
  var skunkBusy = false;
  var skunkTimer = null;
  var prevRemaining = null;
  var badgeShown = false;
  var spamId = null, spamN = 0, spamT = null;

  var pulseT = {};
  function pulse(cls, ms){
    if(!motionOK) return;
    var f = document.getElementById('feu');
    if(!f) return;
    clearTimeout(pulseT[cls]);            // sinon le timer de l'ancien pulse coupe le nouveau en plein vol
    f.classList.remove(cls);
    void f.offsetWidth; // force le redémarrage de l'animation
    f.classList.add(cls);
    pulseT[cls] = setTimeout(function(){ f.classList.remove(cls); }, ms);
  }

  function spawnBurst(n){
    if(!motionOK) return;
    var f = document.getElementById('feu');
    if(!f) return;
    for(var i=0;i<n;i++){
      var s = document.createElement('span');
      s.className = 'burst';
      var dx = (Math.random()*150 - 75);
      var dy = -(55 + Math.random()*85);
      s.style.setProperty('--dx', dx.toFixed(0)+'px');
      s.style.setProperty('--dy', dy.toFixed(0)+'px');
      s.style.left = (44 + Math.random()*12) + '%';
      s.style.animationDuration = (0.7 + Math.random()*0.5).toFixed(2)+'s';
      f.appendChild(s);
      s.addEventListener('animationend', function(){ if(this.parentNode) this.parentNode.removeChild(this); });
    }
  }

  function rainEmber(){
    var f = document.getElementById('feu');
    if(!f) return;
    var e = document.createElement('span');
    e.className = 'ember';
    var dx = (Math.random()*90 - 45);
    e.style.setProperty('--dx', dx.toFixed(0)+'px');
    e.style.left = (18 + Math.random()*64) + '%';
    e.style.animationDuration = (1.3 + Math.random()*0.8).toFixed(2)+'s';
    f.appendChild(e);
    e.addEventListener('animationend', function(){ if(this.parentNode) this.parentNode.removeChild(this); });
  }

  function setFete(on, initial){
    var f = document.getElementById('feu');
    if(!f) return;
    if(on){
      if(!f.classList.contains('fete')){
        f.classList.add('fete');
        if(motionOK){
          if(!initial) spawnBurst(26);          // gros feu d'artifice quand on FINIT
          if(!feteTimer){
            feteTimer = setInterval(rainEmber, 300);
            clearTimeout(feteStopT);            // la pluie de braises s'essouffle après ~12s (le roar continue)
            feteStopT = setTimeout(function(){ if(feteTimer){ clearInterval(feteTimer); feteTimer = null; } }, 12000);
          }
        }
      }
    } else {
      f.classList.remove('fete');
      clearTimeout(feteStopT);
      if(feteTimer){ clearInterval(feteTimer); feteTimer = null; }
    }
  }

  function fireReact(done){
    if(prevDone === null){ prevDone = done; return; }   // pas de réaction au chargement
    if(done > prevDone){
      pulse('pouf', 560);                                 // le feu pogne d'un coup
      pulse('recu', 220);                                 // petit rebond
      spawnBurst(7 + Math.floor(Math.random()*4));        // gerbe d'étincelles
      var nf = document.getElementById('nFait');
      if(nf){ nf.classList.remove('bump'); void nf.offsetWidth; nf.classList.add('bump'); }
      var mini = document.getElementById('minifeu');
      if(mini){ clearTimeout(mini._popT);
        mini.classList.remove('pop'); void mini.offsetWidth; mini.classList.add('pop');
        mini._popT = setTimeout(function(){ mini.classList.remove('pop'); }, 520); }
    } else if(done < prevDone){
      pulse('sputter', 460);                              // le feu retombe quand on décoche
    }
    prevDone = done;
  }

  // petite bouffée de poussière (quand ça trottine ou déguerpit)
  function puffDust(n, leftPct){
    if(!motionOK) return;
    var f = document.getElementById('feu');
    if(!f) return;
    for(var i=0;i<n;i++){
      var d = document.createElement('span');
      d.className = 'dust';
      d.style.left = ((leftPct || 60) + (Math.random()*16 - 8)) + '%';
      d.style.animationDelay = (Math.random()*0.12).toFixed(2)+'s';
      f.appendChild(d);
      d.addEventListener('animationend', function(){ if(this.parentNode) this.parentNode.removeChild(this); });
    }
  }

  // Le raton laveur débarque, pique la guimauve, pis décrisse
  function raccoonHeist(manual){
    if(!motionOK || raccoonBusy) return;
    var f = document.getElementById('feu');
    var gui = f && f.querySelector('.gui');
    if(!f || !gui) return;
    raccoonBusy = true;
    if(manual) gui.classList.add('show');   // sur appel manuel: on montre la guimauve à voler

    var r = document.createElement('div');
    r.className = 'raton';
    r.innerHTML = RATON_SVG;
    f.appendChild(r);
    puffDust(2, 88);                         // poussière à l'entrée (à droite)

    // au moment où il atteint la guimauve: il la pique
    var grab = setTimeout(function(){
      gui.classList.add('vole');       // la guimauve disparaît du bâton
      r.classList.add('plein');        // le raton la tient
      state.vols = (state.vols || 0) + 1;  // Petit Bob tient le compte
      save(); updateVols();
      bobSay(ratonBob());              // Petit Bob commente le vol
      spawnBurst(4);                   // quelques miettes d'étincelles
      puffDust(2, 60);                 // poussière quand il repart
    }, 1550);
    r._grab = grab;

    r.addEventListener('animationend', function(){
      clearTimeout(grab);
      if(r.parentNode) r.parentNode.removeChild(r);
      gui.classList.remove('vole');    // la guimauve repousse (merci le feu)
      gui.classList.remove('show');
      raccoonBusy = false;
    });
  }

  function startRaccoonWatch(){
    if(!motionOK || raccoonTimer) return;
    // de temps en temps, s'il y a une guimauve à voler, le raton tente sa chance
    raccoonTimer = setInterval(function(){
      if(!raccoonBusy && curFire >= 0.45 && Math.random() < 0.3) raccoonHeist();
    }, 11000);
  }

  // Le raton panique et décampe (quand la moufette arrive)
  function raccoonFlee(){
    var f = document.getElementById('feu');
    var r = f && f.querySelector('.raton');
    if(!r) return;
    if(r._grab) clearTimeout(r._grab);
    var cs = getComputedStyle(r).transform;
    r.style.animation = 'none';
    if(cs && cs !== 'none') r.style.transform = cs;   // fige la position actuelle
    requestAnimationFrame(function(){
      r.style.transition = 'transform .5s ease-in, opacity .5s ease-in';
      r.style.transform = 'translateX(-360px)';
      r.style.opacity = '0';
    });
    puffDust(3, 45);                          // nuage de poussière: il déguerpit
    var gui = f.querySelector('.gui');
    var done = function(){
      if(r.parentNode) r.parentNode.removeChild(r);
      if(gui){ gui.classList.remove('vole'); gui.classList.remove('show'); }  // la guimauve repousse
      raccoonBusy = false;
    };
    r.addEventListener('transitionend', done);
    setTimeout(done, 750);
  }

  // La moufette débarque, lève la queue, pis tout le monde décrisse
  function skunkRaid(){
    if(!motionOK || skunkBusy) return;
    var f = document.getElementById('feu');
    if(!f) return;
    skunkBusy = true;

    var m = document.createElement('div');
    m.className = 'mouf';
    m.innerHTML = MOUF_SVG;
    f.appendChild(m);

    // PSCHITT: elle arrose, tout le monde décampe
    var spray = setTimeout(function(){
      var stink = document.createElement('span');
      stink.className = 'stink';
      f.appendChild(stink);
      stink.addEventListener('animationend', function(){ if(this.parentNode) this.parentNode.removeChild(this); });
      // quelques bouffées vertes qui montent
      for(var i=0;i<4;i++){
        var b = document.createElement('span');
        b.className = 'stinkbit';
        b.style.right = (8 + Math.random()*26) + 'px';
        b.style.bottom = (28 + Math.random()*14) + 'px';
        b.style.setProperty('--dx', (-(10+Math.random()*30)).toFixed(0)+'px');
        b.style.animationDelay = (Math.random()*0.35).toFixed(2)+'s';
        f.appendChild(b);
        b.addEventListener('animationend', function(){ if(this.parentNode) this.parentNode.removeChild(this); });
      }
      raccoonFlee();                                  // le raton sacre son camp
      bobSay(moufBob());                              // Petit Bob commente de loin
      pulse('recu', 220); pulse('sputter', 460);      // même le feu recule
      var bob = document.getElementById('bob');
      if(bob){ bob.classList.remove('sacre'); void bob.offsetWidth; bob.classList.add('sacre');
        setTimeout(function(){ bob.classList.remove('sacre'); }, 620); }
    }, 1450);

    m.addEventListener('animationend', function(){
      clearTimeout(spray);
      if(m.parentNode) m.parentNode.removeChild(m);
      skunkBusy = false;
    });
  }

  function startSkunkWatch(){
    if(!motionOK || skunkTimer) return;
    // plus rare que le raton; peut débarquer dès qu'il y a un peu de feu
    skunkTimer = setInterval(function(){
      if(!skunkBusy && curFire >= 0.12 && Math.random() < 0.17) skunkRaid();
    }, 17000);
  }

  function refresh(){
    var t = totals();
    var p = t.tot ? t.done/t.tot : 0;
    curFire = p;
    var initial = (prevDone === null);
    var feuEl = document.getElementById('feu');
    feuEl.style.setProperty('--fire', p.toFixed(3));
    feuEl.classList.toggle('chaud', p > 0.02);           // étincelles en pause quand le feu est mort
    var mini = document.getElementById('minifeu');
    if(mini) mini.style.setProperty('--mf', p.toFixed(3));
    var sky = document.getElementById('sky');
    if(sky) sky.style.opacity = (p * 0.72).toFixed(3);   // le ciel se réchauffe (plafonné pour rester lisible)
    var stars = document.getElementById('stars');
    if(stars){ stars.style.opacity = Math.max(0, Math.min(1, (p - 0.35) / 0.6)).toFixed(3);  // les étoiles s'allument dès ~35%
      stars.classList.toggle('on', p >= 0.35); }         // et scintillent seulement quand visibles
    var moon = document.getElementById('moon');
    if(moon){ moon.style.opacity = Math.max(0, Math.min(1, (p - 0.6) / 0.4)).toFixed(3);     // la lune se lève après ~60%
      moon.classList.toggle('up', p >= 0.6); }
    var constel = document.getElementById('constel');
    if(constel) constel.style.opacity = (Math.max(0, Math.min(1, (p - 0.5) / 0.4)) * 0.85).toFixed(3);  // constellation dès ~50%
    var aurora = document.getElementById('aurora');
    if(aurora){ aurora.style.opacity = Math.max(0, Math.min(1, (p - 0.85) / 0.15)).toFixed(3);          // aurores proche de 100%
      aurora.classList.toggle('on', p >= 0.85); }
    document.getElementById('nFait').textContent = t.done;
    document.getElementById('nTotal').textContent = t.tot;
    document.getElementById('etat').textContent = etatTexte(p);
    var pct = Math.round(p*100);
    document.getElementById('railFill').style.width = pct+'%';
    document.getElementById('railPct').textContent = pct+'%';
    // maj des mini-barres sans tout reconstruire
    DATA.forEach(function(cat, i){
      var sec = document.querySelectorAll('.cat')[i];
      if(!sec) return;
      var ct = catTotals(cat);
      var bar = sec.querySelector('.minibar i');
      var fr = sec.querySelector('.frac');
      if(bar) bar.style.width = (ct.tot?Math.round(ct.done/ct.tot*100):0)+'%';
      if(fr) fr.textContent = ct.done+'/'+ct.tot;
    });
    // le feu réagit à la coche, puis fête à 100%
    fireReact(t.done);
    setFete(p >= 1, initial);

    // rang, baromètre de bines
    updateRang(p);
    updateBines();

    // le drame du dernier item + badge à 100%
    var remaining = t.tot - t.done;
    if(t.tot > 0){
      if(remaining === 1 && prevRemaining !== null && prevRemaining !== 1){
        bobSay('il te reste UN item. C’EST ÇA QUE T’AS OUBLIÉ, LÀ. Respire par le nez.');
      }
      if(remaining === 0 && prevRemaining === 1 && !badgeShown){
        badgeShown = true;
        showBadge('🏅 Badge débloqué : « J’ai failli oublier le papier de toilette »');
      }
    }
    prevRemaining = remaining;
  }

  (async function init(){
    var v = document.getElementById('ver');
    if(v) v.textContent = VERSION;
    await load();
    render();
    if(!joinCampFromHash()) resumeCamp(); // camp partagé live (lien #camp= ou repris) — AVANT le lien de liste,
    applySharedIfAny();                   // pour que campId soit prêt et que la diffusion immédiate fonctionne

    // Compteur de vols de guimauves
    updateVols();

    // Petit Bob: première niaiserie + bouton pour en pogner une autre
    var bm = document.getElementById('bobmot');
    if(bm) bm.textContent = bobMot();
    var bobBtn = document.getElementById('bob');
    if(bobBtn) bobBtn.addEventListener('click', showBob);
    // Petit Bob ne tourne plus tout seul: il change seulement quand tu tapes dessus ou tu coches.

    // Ciel de soir: on sème les étoiles et on guette les filantes
    makeStars();
    startNightWatch();
    var moonEl = document.getElementById('moon');
    if(moonEl) moonEl.addEventListener('click', makeWish);

    // Le raton laveur guette la guimauve, la moufette guette tout le monde
    startRaccoonWatch();
    startSkunkWatch();
    startSausageWatch();
    startMachineWatch();

    // Poutine d'urgence: tape le titre 5 fois vite, ou le code Konami
    var titleTaps = 0, titleT = null;
    var h1 = document.querySelector('h1');
    if(h1){
      h1.style.cursor = 'pointer';
      h1.addEventListener('click', function(){
        titleTaps++;
        clearTimeout(titleT);
        titleT = setTimeout(function(){ titleTaps = 0; }, 1200);
        if(titleTaps >= 5){ titleTaps = 0; dropPoutine(); }
      });
    }
    var konami = [38,38,40,40,37,39,37,39,66,65], kpos = 0;
    window.addEventListener('keydown', function(e){
      if(e.keyCode === konami[kpos]){ kpos++; if(kpos === konami.length){ kpos = 0; dropPoutine(); } }
      else { kpos = (e.keyCode === konami[0]) ? 1 : 0; }
    });

    // Déclencheurs manuels: on les appelle sur commande
    var cr = document.getElementById('callRaton');
    if(cr) cr.addEventListener('click', function(){ raccoonHeist(true); });
    var cm = document.getElementById('callMouf');
    if(cm) cm.addEventListener('click', function(){ skunkRaid(); });
    var cmac = document.getElementById('callMachine');
    if(cmac) cmac.addEventListener('click', function(){ machineGag(); });

    // PWA: enregistrement du service worker pour le mode hors-ligne
    if('serviceWorker' in navigator){
      try{ navigator.serviceWorker.register('sw.js'); }catch(e){}
    }
  })();
})();
</script>
