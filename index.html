<!DOCTYPE html>
<html lang="fr-CA">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Camping en tente</title>
<meta name="description" content="Liste de camping en tente, l'été avec les flos. Coche, le feu va pogner.">
<meta name="theme-color" content="#13241B">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Camping">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --nuit:#13241B;
    --nuit-2:#0D1812;
    --foret:#1E3A2C;
    --toile:#EFE6D3;
    --toile-2:#E4D7BC;
    --encre:#21332A;
    --braise:#E8763C;
    --flamme:#F4A93D;
    --or:#FBD46A;
    --ciel:#7BA0AE;
    --cendre:#9DAA9C;
    --ombre:0 10px 30px rgba(0,0,0,.35);
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

  body{
    margin:0;
    font-family:'Hanken Grotesk',system-ui,sans-serif;
    color:var(--toile);
    background:
      repeating-radial-gradient(circle at 70% -10%, rgba(123,160,174,.05) 0 1px, transparent 1px 26px),
      repeating-radial-gradient(circle at 15% 120%, rgba(232,118,60,.05) 0 1px, transparent 1px 32px),
      radial-gradient(120% 80% at 50% -10%, var(--foret) 0%, var(--nuit) 45%, var(--nuit-2) 100%);
    background-attachment:fixed;
    min-height:100vh;
    line-height:1.45;
  }

  /* Barre fine collante en haut */
  .rail{
    position:sticky; top:0; z-index:50;
    display:flex; align-items:center; gap:12px;
    padding:10px 16px calc(10px + env(safe-area-inset-top,0)) 16px;
    padding-top:max(10px, env(safe-area-inset-top,0));
    background:linear-gradient(to bottom, rgba(13,24,18,.96), rgba(13,24,18,.82));
    backdrop-filter:blur(8px);
    border-bottom:1px solid rgba(239,230,211,.08);
  }
  .rail .pip{
    width:12px;height:12px;border-radius:50% 50% 50% 0;
    transform:rotate(45deg);
    background:radial-gradient(circle at 60% 60%, var(--or), var(--braise) 70%);
    box-shadow:0 0 10px rgba(244,169,61,.6);
    flex:0 0 auto;
  }
  .rail .railbar{flex:1; height:5px; border-radius:99px; background:rgba(239,230,211,.12); overflow:hidden;}
  .rail .railbar i{display:block; height:100%; width:0; border-radius:99px;
    background:linear-gradient(90deg, var(--braise), var(--or)); transition:width .45s cubic-bezier(.22,1,.36,1);}
  .rail .railpct{font-weight:800; font-size:14px; min-width:42px; text-align:right; letter-spacing:.3px;}

  .wrap{max-width:560px; margin:0 auto; padding:0 16px 60px;}

  /* Entête + feu */
  .hero{padding:18px 4px 8px; text-align:center;}
  .eyebrow{
    font-size:12px; letter-spacing:3px; text-transform:uppercase;
    color:var(--ciel); font-weight:700; margin:0 0 6px;
  }
  h1{
    font-family:'Anton',sans-serif; font-weight:400;
    font-size:clamp(40px,12vw,62px); line-height:.92;
    margin:0; letter-spacing:1px; text-transform:uppercase;
    color:var(--toile);
  }
  .sous{margin:8px 0 0; color:var(--cendre); font-size:15px;}

  .feu{position:relative; height:170px; margin:6px auto 2px; width:220px; --fire:0;}
  .glow{
    position:absolute; left:50%; bottom:14px; transform:translateX(-50%);
    width:170px; height:170px; border-radius:50%;
    background:radial-gradient(circle, rgba(244,169,61,.55) 0%, rgba(232,118,60,.28) 35%, transparent 68%);
    opacity:calc(.18 + .82 * var(--fire));
    filter:blur(6px);
    transition:opacity .5s ease;
  }
  .buche{position:absolute; bottom:10px; left:50%; width:96px; height:18px; border-radius:9px;
    background:linear-gradient(180deg,#6b4a32,#3f2a1c);
    box-shadow:inset 0 -3px 4px rgba(0,0,0,.4), 0 0 14px rgba(232,118,60,calc(.25 + .5*var(--fire)));}
  .buche.b1{transform:translateX(-50%) rotate(-16deg);}
  .buche.b2{transform:translateX(-50%) rotate(15deg);}
  .buche::after{content:""; position:absolute; inset:0 6px; border-radius:9px;
    background:radial-gradient(circle at 50% 120%, rgba(244,169,61,calc(.7*var(--fire))), transparent 60%);}

  .flammes{position:absolute; left:50%; bottom:20px; transform:translateX(-50%); width:90px; height:120px;
    transform-origin:bottom center; mix-blend-mode:screen;}
  .flamme{position:absolute; left:50%; bottom:0; transform:translateX(-50%);
    border-radius:50% 50% 50% 50% / 62% 62% 38% 38%; filter:blur(2px); transform-origin:bottom center;}
  .f1{width:calc(56px*(.45 + .55*var(--fire))); height:calc(112px*(.28 + .72*var(--fire)));
    background:linear-gradient(0deg, var(--braise) 0%, #c4421f 45%, transparent 100%); opacity:calc(.5 + .5*var(--fire));}
  .f2{width:calc(38px*(.45 + .55*var(--fire))); height:calc(82px*(.28 + .72*var(--fire)));
    background:linear-gradient(0deg, var(--flamme) 0%, var(--braise) 55%, transparent 100%); opacity:calc(.55 + .45*var(--fire));}
  .f3{width:calc(20px*(.5 + .5*var(--fire))); height:calc(48px*(.3 + .7*var(--fire)));
    background:linear-gradient(0deg, var(--or) 0%, #fff3cf 60%, transparent 100%); opacity:calc(.4 + .6*var(--fire));}

  .spark{position:absolute; left:50%; bottom:34px; width:4px; height:4px; border-radius:50%;
    background:var(--or); opacity:0;}

  @media (prefers-reduced-motion: no-preference){
    .f1{animation:flick1 1.7s ease-in-out infinite;}
    .f2{animation:flick2 1.3s ease-in-out infinite;}
    .f3{animation:flick3 .9s ease-in-out infinite;}
    .glow{animation:breathe 2.6s ease-in-out infinite;}
    .spark{animation:rise 2.4s linear infinite;}
    .s1{animation-delay:.1s; left:42%;}
    .s2{animation-delay:.7s; left:58%;}
    .s3{animation-delay:1.3s; left:48%;}
    .s4{animation-delay:1.9s; left:54%;}
    .s5{animation-delay:1s; left:46%;}
  }
  @keyframes flick1{0%,100%{transform:translateX(-50%) scaleY(1) scaleX(1) rotate(-1deg);} 50%{transform:translateX(-52%) scaleY(1.06) scaleX(.95) rotate(1deg);}}
  @keyframes flick2{0%,100%{transform:translateX(-50%) scaleY(.97) skewX(2deg);} 50%{transform:translateX(-48%) scaleY(1.08) skewX(-3deg);}}
  @keyframes flick3{0%,100%{transform:translateX(-50%) scaleY(1) translateY(0);} 50%{transform:translateX(-51%) scaleY(1.12) translateY(-3px);}}
  @keyframes breathe{0%,100%{opacity:calc(.18 + .82*var(--fire));} 50%{opacity:calc(.1 + .72*var(--fire));}}
  @keyframes rise{
    0%{opacity:0; transform:translate(-50%,0) scale(1);}
    12%{opacity:calc(.9*var(--fire));}
    100%{opacity:0; transform:translate(-50%,-90px) scale(.4);}
  }

  /* --- Réactions rigolotes du feu --- */
  .feu{transition:transform .2s cubic-bezier(.34,1.56,.64,1);}
  .feu.recu{transform:translateY(-3px) scale(1.05);}

  /* Fumée: forte quand le feu est mort, disparaît quand ça chauffe */
  .smoke{position:absolute; left:50%; bottom:26px; transform:translateX(-50%);
    width:60px; height:90px; opacity:calc(.65*(1 - var(--fire))); transition:opacity .5s ease; pointer-events:none;}
  .wisp{position:absolute; bottom:0; left:50%; width:16px; height:16px; border-radius:50%;
    background:radial-gradient(circle, rgba(197,204,197,.55), rgba(197,204,197,0) 70%); opacity:0;}

  /* Guimauve qui grille quand le feu est assez fort */
  .gui{position:absolute; right:12px; bottom:20px; width:72px; height:84px;
    opacity:calc((var(--fire) - .45) * 2.2); transition:opacity .5s ease; pointer-events:none; transform-origin:right bottom;}
  .gui .stick{position:absolute; right:0; bottom:8px; width:66px; height:3px; border-radius:2px;
    background:linear-gradient(90deg,#7a5a3a,#a67c48); transform:rotate(-18deg); transform-origin:right center;}
  .gui .mallow{position:absolute; left:1px; top:19px; width:16px; height:20px; border-radius:7px;
    background:radial-gradient(circle at 50% 32%, #fff8ee, #efdcc0 68%, #e6c49a 100%);
    box-shadow:0 0 calc(10px*var(--fire)) rgba(244,169,61,calc(.85*var(--fire)));}

  /* Gerbe d'étincelles créée à chaque coche */
  .burst{position:absolute; left:50%; bottom:36px; width:5px; height:5px; border-radius:50%;
    background:radial-gradient(circle,#fff3cf,var(--or) 60%,var(--braise)); opacity:0; pointer-events:none;
    box-shadow:0 0 6px rgba(251,212,106,.9); animation:burst .9s ease-out forwards;}

  /* Braises qui pleuvent pendant la fête (100%) */
  .ember{position:absolute; bottom:30px; width:6px; height:6px; border-radius:50%;
    background:radial-gradient(circle,var(--or),var(--braise) 70%); opacity:0; pointer-events:none;
    box-shadow:0 0 7px rgba(232,118,60,.8); animation:ember 1.7s ease-in forwards;}

  /* Raton laveur voleur de guimauve */
  .raton{position:absolute; right:6px; bottom:20px; width:60px; height:50px;
    opacity:0; pointer-events:none; z-index:6; transform:translateX(170px);
    animation:heist 4s ease-in-out forwards;
    filter:drop-shadow(0 0 2px rgba(239,230,211,.55)) drop-shadow(0 3px 5px rgba(0,0,0,.5));}
  .raton svg{width:100%; height:100%; display:block;}
  .raton .loot{position:absolute; left:1px; bottom:4px; width:12px; height:14px; border-radius:5px;
    background:radial-gradient(circle at 50% 32%, #fff8ee, #efdcc0 70%, #e6c49a);
    box-shadow:0 0 7px rgba(244,169,61,.85); opacity:0; transform:scale(.4);
    transition:opacity .15s ease, transform .15s ease;}
  .raton.plein .loot{opacity:1; transform:scale(1);}
  .gui.vole .mallow{opacity:0; transition:opacity .12s ease;}
  @keyframes heist{
    0%{transform:translateX(160px) translateY(2px); opacity:0;}
    8%{opacity:1;}
    30%{transform:translateX(4px) translateY(0);}
    38%{transform:translateX(-3px) translateY(-4px);}
    46%{transform:translateX(0) translateY(0);}
    100%{transform:translateX(-310px) translateY(3px); opacity:0;}
  }

  .compte b{display:inline-block;}
  .bump{animation:bump .45s cubic-bezier(.34,1.56,.64,1);}

  @media (prefers-reduced-motion: no-preference){
    .wisp{animation:wisp 3.4s ease-in infinite;}
    .w1{left:38%; animation-delay:0s;}
    .w2{left:56%; animation-delay:1.1s;}
    .w3{left:46%; animation-delay:2.2s;}
    .gui{animation:guibob 2.8s ease-in-out infinite;}
    .feu.pouf .flammes{animation:pouf .55s cubic-bezier(.22,1,.36,1);}
    .feu.pouf .glow{animation:glowpop .55s ease;}
    .feu.sputter .flammes{animation:sputter .45s ease;}
    .feu.fete .flammes{animation:roar 1s ease-in-out infinite;}
    .feu.fete{animation:party 1s ease-in-out infinite;}
  }

  @keyframes wisp{
    0%{opacity:0; transform:translate(-50%,0) scale(.6);}
    20%{opacity:.75;}
    100%{opacity:0; transform:translate(-50%,-72px) scale(1.35);}
  }
  @keyframes pouf{
    0%{transform:translateX(-50%) scaleY(1) scaleX(1);}
    28%{transform:translateX(-50%) scaleY(1.42) scaleX(1.12) translateY(-8px);}
    60%{transform:translateX(-50%) scaleY(.93) scaleX(1.04);}
    100%{transform:translateX(-50%) scaleY(1) scaleX(1);}
  }
  @keyframes sputter{
    0%,100%{transform:translateX(-50%) scaleY(1);}
    40%{transform:translateX(-50%) scaleY(.72) scaleX(1.05);}
  }
  @keyframes glowpop{0%{filter:blur(6px);} 30%{filter:blur(3px); opacity:1;} 100%{filter:blur(6px);}}
  @keyframes guibob{0%,100%{transform:translateY(0) rotate(0);} 50%{transform:translateY(-3px) rotate(-3deg);}}
  @keyframes burst{
    0%{opacity:0; transform:translate(-50%,0) scale(1);}
    12%{opacity:1;}
    100%{opacity:0; transform:translate(calc(-50% + var(--dx,0px)), var(--dy,-80px)) scale(.3);}
  }
  @keyframes ember{
    0%{opacity:0; transform:translateY(0) translateX(0) scale(1);}
    15%{opacity:1;}
    100%{opacity:0; transform:translateY(-125px) translateX(var(--dx,0px)) scale(.4);}
  }
  @keyframes roar{0%,100%{transform:translateX(-50%) scaleY(1.06) scaleX(1.02);} 50%{transform:translateX(-50%) scaleY(1.2) scaleX(1.08);}}
  @keyframes party{0%,100%{transform:rotate(-1.6deg);} 50%{transform:rotate(1.6deg);}}
  @keyframes bump{0%{transform:scale(1);} 40%{transform:scale(1.55);} 100%{transform:scale(1);}}

  .etat{font-size:14px; color:var(--flamme); font-weight:700; margin:4px 0 0; letter-spacing:.4px; min-height:20px; transition:color .3s ease;}
  .compte{font-family:'Anton',sans-serif; font-size:30px; letter-spacing:1px; margin:2px 0 0; color:var(--toile);}
  .compte b{color:var(--braise);}
  .compte small{font-family:'Hanken Grotesk',sans-serif; font-weight:600; font-size:14px; color:var(--cendre); letter-spacing:0;}

  /* Petit Bob, le commentateur officiel du camping */
  .bob{
    display:flex; align-items:flex-start; gap:9px; margin:14px auto 2px; max-width:430px;
    text-align:left; cursor:pointer; font-family:inherit; color:var(--toile);
    background:rgba(239,230,211,.06); border:1px solid rgba(239,230,211,.1);
    border-radius:14px; padding:11px 14px; transition:background .15s ease, transform .08s ease;
  }
  .bob:hover{background:rgba(239,230,211,.1);}
  .bob:active{transform:scale(.99);}
  .bob:focus-visible{outline:3px solid var(--ciel); outline-offset:2px;}
  .bobpip{flex:0 0 auto; width:16px; height:16px; margin-top:2px; border-radius:50% 50% 50% 0;
    transform:rotate(45deg);
    background:radial-gradient(circle at 60% 60%, var(--or), var(--braise) 70%);
    box-shadow:0 0 8px rgba(244,169,61,.55);}
  .bobtxt{flex:1; font-size:13.5px; line-height:1.4; color:var(--cendre);}
  .bobtxt b{color:var(--flamme); font-weight:800; letter-spacing:.2px;}
  #bobmot{transition:opacity .2s ease;}

  /* Catégories */
  .cat{
    background:linear-gradient(180deg, var(--toile) 0%, var(--toile-2) 100%);
    color:var(--encre);
    border-radius:18px; margin:14px 0; overflow:hidden;
    box-shadow:var(--ombre);
    border:1px solid rgba(33,51,42,.06);
  }
  .cathead{
    width:100%; border:0; background:transparent; cursor:pointer;
    display:flex; align-items:center; gap:12px; text-align:left;
    padding:15px 16px; font-family:inherit; color:inherit;
  }
  .ic{flex:0 0 auto; width:34px; height:34px; border-radius:10px;
    display:grid; place-items:center; background:rgba(232,118,60,.14); color:var(--braise);}
  .ic svg{width:20px; height:20px;}
  .cattitle{flex:1; min-width:0;}
  .cattitle .nom{font-weight:800; font-size:16px; letter-spacing:.2px;}
  .cattitle .mini{display:flex; align-items:center; gap:8px; margin-top:5px;}
  .cattitle .minibar{flex:1; height:4px; border-radius:99px; background:rgba(33,51,42,.12); overflow:hidden; max-width:160px;}
  .cattitle .minibar i{display:block; height:100%; width:0; background:var(--braise); border-radius:99px; transition:width .4s ease;}
  .cattitle .frac{font-size:12px; font-weight:700; color:#6f7d70; white-space:nowrap; font-variant-numeric:tabular-nums;}
  .chev{flex:0 0 auto; width:22px; height:22px; color:#8a9789; transition:transform .3s ease;}
  .cat[open] .chev, .cat.ouvert .chev{transform:rotate(180deg);}

  .catbody{padding:0 10px 8px;}
  .cat:not(.ouvert) .catbody{display:none;}

  .item{
    display:flex; align-items:flex-start; gap:13px;
    padding:11px 8px; border-radius:12px; cursor:pointer;
    min-height:46px; position:relative;
    transition:background .15s ease;
  }
  .item:hover{background:rgba(33,51,42,.04);}
  .item input{position:absolute; opacity:0; width:1px; height:1px;}
  .box{
    flex:0 0 auto; width:24px; height:24px; margin-top:1px; border-radius:8px;
    border:2px solid #b9ac8f; background:#fff;
    display:grid; place-items:center; transition:all .18s ease;
  }
  .box svg{width:15px; height:15px; stroke:#fff; stroke-width:3.5; fill:none;
    stroke-linecap:round; stroke-linejoin:round; stroke-dasharray:24; stroke-dashoffset:24; transition:stroke-dashoffset .25s ease;}
  .item input:checked + .box{background:linear-gradient(135deg, var(--flamme), var(--braise)); border-color:var(--braise);}
  .item input:checked + .box svg{stroke-dashoffset:0;}
  .item input:focus-visible + .box{outline:3px solid var(--ciel); outline-offset:2px;}
  .txt{flex:1; min-width:0;}
  .txt .nm{font-size:15.5px; font-weight:600; transition:color .2s ease;}
  .txt .nt{font-size:12.5px; color:#7c8a7d; margin-top:1px;}
  .item input:checked ~ .txt .nm{color:#a9b0a4; text-decoration:line-through; text-decoration-color:rgba(169,176,164,.7);}
  .del{flex:0 0 auto; border:0; background:transparent; color:#bcae93; cursor:pointer;
    width:28px; height:28px; border-radius:8px; font-size:18px; line-height:1; align-self:center;}
  .del:hover{background:rgba(33,51,42,.06); color:var(--braise);}

  .ajout{display:flex; gap:8px; padding:8px 8px 6px;}
  .ajout input{
    flex:1; min-width:0; border:1.5px dashed #c7b998; background:rgba(255,255,255,.5);
    border-radius:10px; padding:10px 12px; font-family:inherit; font-size:14.5px; color:var(--encre);
  }
  .ajout input::placeholder{color:#9aa890;}
  .ajout input:focus{outline:none; border-color:var(--braise); border-style:solid; background:#fff;}
  .ajout button{
    flex:0 0 auto; border:0; border-radius:10px; padding:0 16px; cursor:pointer;
    background:var(--encre); color:var(--toile); font-family:inherit; font-weight:700; font-size:14px;
  }
  .ajout button:active{transform:scale(.97);}

  /* Pied */
  .pied{display:flex; flex-direction:column; align-items:center; gap:13px; margin-top:28px;}
  .pdf{
    border:0; border-radius:99px; padding:14px 30px; cursor:pointer;
    font-family:inherit; font-weight:800; font-size:15px; color:#fff; letter-spacing:.2px;
    background:linear-gradient(135deg, var(--flamme), var(--braise));
    box-shadow:0 10px 24px rgba(232,118,60,.32);
    display:flex; align-items:center; gap:9px;
  }
  .pdf:hover{filter:brightness(1.04);}
  .pdf:active{transform:scale(.97);}
  .pdf svg{width:18px; height:18px;}
  .reset{
    border:1.5px solid rgba(239,230,211,.25); background:transparent; color:var(--cendre);
    border-radius:99px; padding:11px 22px; cursor:pointer; font-family:inherit; font-weight:700; font-size:14px;
    display:flex; align-items:center; gap:8px;
  }
  .reset:hover{border-color:var(--braise); color:var(--flamme);}
  .install{
    border:1.5px solid var(--ciel); background:rgba(123,160,174,.12); color:var(--toile);
    border-radius:99px; padding:12px 24px; cursor:pointer; font-family:inherit; font-weight:800; font-size:14.5px;
    display:flex; align-items:center; gap:9px; letter-spacing:.2px;
  }
  .install:hover{background:rgba(123,160,174,.22); border-color:var(--or);}
  .install:active{transform:scale(.97);}
  .install svg{width:18px; height:18px;}
  .installtip{max-width:430px; text-align:center; color:var(--cendre); font-size:13px; line-height:1.4;
    background:rgba(239,230,211,.06); border:1px solid rgba(239,230,211,.1); border-radius:12px; padding:10px 14px;}
  .installtip b{color:var(--flamme);}
  .confirm{display:flex; gap:8px; align-items:center; color:var(--cendre); font-size:14px; font-weight:600;}
  .confirm button{border-radius:99px; padding:9px 18px; border:0; cursor:pointer; font-family:inherit; font-weight:700; font-size:14px;}
  .confirm .oui{background:var(--braise); color:#fff;}
  .confirm .non{background:rgba(239,230,211,.14); color:var(--toile);}

  .note{text-align:center; color:rgba(157,170,156,.6); font-size:12px; margin-top:18px;}

  /* Document PDF / impression */
  #printDoc{ display:none; }
  @media print{
    .rail, .wrap{ display:none !important; }
    #printDoc{ display:block; color:#1d1d1b; }
    html, body{ background:#fff !important; background-image:none !important; }
    body{ font-family:'Hanken Grotesk', system-ui, sans-serif; }
    @page{ margin:14mm 15mm 15mm; }

    .pd-head{ border-bottom:2.5px solid #1E3A2C; padding-bottom:10px; margin-bottom:14px; }
    .pd-title{ font-family:'Anton', sans-serif; font-weight:400; text-transform:uppercase;
      letter-spacing:.5px; color:#1E3A2C; font-size:26pt; line-height:1; margin:0; }
    .pd-sub{ color:#5a5a52; font-size:11pt; margin-top:5px; }
    .pd-meta{ color:#7a7a70; font-size:9.5pt; margin-top:7px; }

    .pd-cat{ break-inside:avoid; page-break-inside:avoid; margin-top:13px; }

  function genererPDF(){
    var t = totals();
    var reste = t.tot - t.done;
    var dateStr = new Date().toLocaleDateString('fr-CA', { day:'numeric', month:'long', year:'numeric' });

    var PW=612, PH=792, ML=54, MR=54, MB=54;
    var CW = PW-ML-MR;
    var top = PH-54;

    var green='0.118 0.227 0.176';
    var ink='0.114 0.114 0.106';
    var grey='0.48 0.48 0.44';
    var greyL='0.62 0.62 0.56';
    var ruleL='0.85 0.85 0.82';

    var pages=[];
    var buf=[];
    var y=top;
    var pageNum=0;

    function f(n){ return Math.round(n*100)/100; }
    function tw(str, fs){ return String(str).length * fs * 0.52; }
    function enc(str){
      str=String(str);
      var out='';
      for(var i=0;i<str.length;i++){
        var ch=str[i], code=str.charCodeAt(i);
        if(code===0x2019||code===0x2018) ch="'";
        else if(code===0x201C||code===0x201D) ch='"';
        else if(code===0x2013||code===0x2014) ch='-';
        else if(code===0x2026) ch='...';
        code=ch.charCodeAt(0);
        if(ch.length===1 && code>255) ch='?';
        var e='';
        for(var j=0;j<ch.length;j++){
          var c=ch[j];
          if(c==='('||c===')'||c==='\\') e+='\\'+c; else e+=c;
        }
        out+=e;
      }
      return out;
    }
    function text(str, x, yb, fs, font, color){
      buf.push('BT /'+font+' '+fs+' Tf '+color+' rg 1 0 0 1 '+f(x)+' '+f(yb)+' Tm ('+enc(str)+') Tj ET');
    }
    function rule(x1, yy, x2, color, wd){
      buf.push(color+' RG '+(wd||1)+' w '+f(x1)+' '+f(yy)+' m '+f(x2)+' '+f(yy)+' l S');
    }
    function box(x, yb, on){
      var s=10;
      buf.push((on?green:'0.33 0.33 0.33')+' RG 1.2 w '+f(x)+' '+f(yb)+' '+s+' '+s+' re S');
      if(on){
        buf.push(green+' RG 1.6 w '+f(x+2)+' '+f(yb+5)+' m '+f(x+4)+' '+f(yb+2.5)+' l '+f(x+8)+' '+f(yb+8)+' l S');
      }
    }
    function footer(){
      rule(ML, MB+10, PW-MR, ruleL, 0.8);
      text('Liste de camping  ·  '+dateStr, ML, MB, 8, 'F1', greyL);
      var pn='Page '+(pageNum+1);
      text(pn, PW-MR-tw(pn,8), MB, 8, 'F1', greyL);
    }
    function finalizePage(){
      footer();
      pages.push(buf.join('\n'));
      buf=[];
      pageNum++;
    }
    function ensure(h){
      if(y - h < MB + 24){ finalizePage(); y=top; }
    }

    text('LISTE DE CAMPING EN TENTE', ML, y-18, 22, 'F2', green); y-=26;
    text('Été, terrain aménagé, avec les deux flos', ML, y-2, 10.5, 'F1', grey); y-=15;
    text('Préparée le '+dateStr+'    ·    '+t.done+' rangés sur '+t.tot+'    ·    '+reste+' encore à prendre', ML, y-2, 9, 'F1', greyL); y-=12;
    rule(ML, y, PW-MR, green, 1.5); y-=18;

    DATA.forEach(function(cat){
      var ct=catTotals(cat);
      ensure(34);
      text(cat.nom, ML, y-11, 12.5, 'F2', green);
      text('('+ct.done+'/'+ct.tot+')', ML+tw(cat.nom,12.5)+8, y-11, 9.5, 'F1', greyL);
      y-=15;
      rule(ML, y, PW-MR, ruleL, 0.8);
      y-=12;
      allItems(cat).forEach(function(it){
        var on=!!state.checked[it.id];
        var nm=it.nm, note=it.nt||'';
        var sep='   ·   ';
        var sameW = tw(nm,10) + (note? tw(sep+note,9) : 0);
        var wrap = note && (16 + sameW > CW);
        var rowH = wrap? 23 : 15;
        ensure(rowH);
        var baseY = y-9;
        box(ML, y-10.5, on);
        text(nm, ML+16, baseY, 10, 'F1', ink);
        if(note && !wrap){
          text(sep+note, ML+16+tw(nm,10), baseY, 9, 'F1', grey);
        }
        if(wrap){
          text(note, ML+16, baseY-12, 9, 'F1', grey);
          y-=23;
        } else {
          y-=15;
        }
      });
      y-=8;
    });
    finalizePage();

    var fontH='<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica /Encoding /WinAnsiEncoding >>';
    var fontB='<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold /Encoding /WinAnsiEncoding >>';
    var allObjs=[];
    allObjs[1]='<< /Type /Catalog /Pages 2 0 R >>';
    allObjs[3]=fontH;
    allObjs[4]=fontB;
    var num=5, pageNums=[];
    for(var i=0;i<pages.length;i++){
      var pnum=num++, cnum=num++;
      pageNums.push(pnum);
      allObjs[pnum]='<< /Type /Page /Parent 2 0 R /MediaBox [0 0 612 792] /Resources << /Font << /F1 3 0 R /F2 4 0 R >> >> /Contents '+cnum+' 0 R >>';
      var stream=pages[i];
      allObjs[cnum]='<< /Length '+stream.length+' >>\nstream\n'+stream+'\nendstream';
    }
    var kids=pageNums.map(function(n){return n+' 0 R';}).join(' ');
    allObjs[2]='<< /Type /Pages /Kids ['+kids+'] /Count '+pages.length+' >>';

    var pdf='%PDF-1.4\n%\xE2\xE3\xCF\xD3\n';
    var offsets=[];
    for(var n=1;n<allObjs.length;n++){
      offsets[n]=pdf.length;
      pdf += n+' 0 obj\n'+allObjs[n]+'\nendobj\n';
    }
    var xrefStart=pdf.length;
    var count=allObjs.length;
    pdf+='xref\n0 '+count+'\n';
    pdf+='0000000000 65535 f \n';
    for(var n2=1;n2<count;n2++){
      pdf+=('0000000000'+offsets[n2]).slice(-10)+' 00000 n \n';
    }
    pdf+='trailer\n<< /Size '+count+' /Root 1 0 R >>\nstartxref\n'+xrefStart+'\n%%EOF';

    var bytes=new Uint8Array(pdf.length);
    for(var k=0;k<pdf.length;k++) bytes[k]=pdf.charCodeAt(k)&0xFF;
    var blob=new Blob([bytes], {type:'application/pdf'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url; a.download='liste-camping.pdf';
    document.body.appendChild(a); a.click();
    setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); }, 1500);
  }

  function spawnBurst(n){
    if(!motionOK) return;
    var f = document.getElementById('feu');
    if(!f) return;
    for(var i=0;i<n;i++){
      var s = document.createElement('span');
      s.className = 'burst';
      var dx = (Math.random()*150 - 75);
      var dy = -(55 + Math.random()*85);
      s.style.setProperty('--dx', dx.toFixed(0)+'px');
      s.style.setProperty('--dy', dy.toFixed(0)+'px');
      s.style.left = (44 + Math.random()*12) + '%';
      s.style.animationDuration = (0.7 + Math.random()*0.5).toFixed(2)+'s';
      f.appendChild(s);
      s.addEventListener('animationend', function(){ if(this.parentNode) this.parentNode.removeChild(this); });
    }
  }

  function rainEmber(){
    var f = document.getElementById('feu');
    if(!f) return;
    var e = document.createElement('span');
    e.className = 'ember';
    var dx = (Math.random()*90 - 45);
    e.style.setProperty('--dx', dx.toFixed(0)+'px');
    e.style.left = (18 + Math.random()*64) + '%';
    e.style.animationDuration = (1.3 + Math.random()*0.8).toFixed(2)+'s';
    f.appendChild(e);
    e.addEventListener('animationend', function(){ if(this.parentNode) this.parentNode.removeChild(this); });
  }

  function setFete(on, initial){
    var f = document.getElementById('feu');
    if(!f) return;
    if(on){
      if(!f.classList.contains('fete')){
        f.classList.add('fete');
        if(motionOK){
          if(!initial) spawnBurst(26);          // gros feu d'artifice quand on FINIT
          if(!feteTimer) feteTimer = setInterval(rainEmber, 240);
        }
      }
    } else {
      f.classList.remove('fete');
      if(feteTimer){ clearInterval(feteTimer); feteTimer = null; }
    }
  }

  function fireReact(done){
    if(prevDone === null){ prevDone = done; return; }   // pas de réaction au chargement
    if(done > prevDone){
      pulse('pouf', 560);                                 // le feu pogne d'un coup
      pulse('recu', 220);                                 // petit rebond
      spawnBurst(7 + Math.floor(Math.random()*4));        // gerbe d'étincelles
      var nf = document.getElementById('nFait');
      if(nf){ nf.classList.remove('bump'); void nf.offsetWidth; nf.classList.add('bump'); }
    } else if(done < prevDone){
      pulse('sputter', 460);                              // le feu retombe quand on décoche
    }
    prevDone = done;
  }

  // Le raton laveur débarque, pique la guimauve, pis décrisse
  function raccoonHeist(){
    if(!motionOK || raccoonBusy) return;
    var f = document.getElementById('feu');
    var gui = f && f.querySelector('.gui');
    if(!f || !gui) return;
    raccoonBusy = true;

    var r = document.createElement('div');
    r.className = 'raton';
    r.innerHTML = RATON_SVG;
    f.appendChild(r);

    // au moment où il atteint la guimauve: il la pique
    var grab = setTimeout(function(){
      gui.classList.add('vole');       // la guimauve disparaît du bâton
      r.classList.add('plein');        // le raton la tient
      bobSay(ratonBob());              // Petit Bob commente le vol
      // quelques miettes d'étincelles au passage
      spawnBurst(4);
    }, 1550);

    r.addEventListener('animationend', function(){
      clearTimeout(grab);
      if(r.parentNode) r.parentNode.removeChild(r);
      gui.classList.remove('vole');    // la guimauve repousse (merci le feu)
      raccoonBusy = false;
    });
  }

  function startRaccoonWatch(){
    if(!motionOK || raccoonTimer) return;
    // de temps en temps, s'il y a une guimauve à voler, le raton tente sa chance
    raccoonTimer = setInterval(function(){
      if(!raccoonBusy && curFire >= 0.45 && Math.random() < 0.3) raccoonHeist();
    }, 11000);
  }

  function refresh(){
    var t = totals();
    var p = t.tot ? t.done/t.tot : 0;
    curFire = p;
    var initial = (prevDone === null);
    document.getElementById('feu').style.setProperty('--fire', p.toFixed(3));
    document.getElementById('nFait').textContent = t.done;
    document.getElementById('nTotal').textContent = t.tot;
    document.getElementById('etat').textContent = etatTexte(p);
    var pct = Math.round(p*100);
    document.getElementById('railFill').style.width = pct+'%';
    document.getElementById('railPct').textContent = pct+'%';
    // maj des mini-barres sans tout reconstruire
    DATA.forEach(function(cat, i){
      var sec = document.querySelectorAll('.cat')[i];
      if(!sec) return;
      var ct = catTotals(cat);
      var bar = sec.querySelector('.minibar i');
      var fr = sec.querySelector('.frac');
      if(bar) bar.style.width = (ct.tot?Math.round(ct.done/ct.tot*100):0)+'%';
      if(fr) fr.textContent = ct.done+'/'+ct.tot;
    });
    // le feu réagit à la coche, puis fête à 100%
    fireReact(t.done);
    setFete(p >= 1, initial);
  }

  (async function init(){
    var v = document.getElementById('ver');
    if(v) v.textContent = VERSION;
    await load();
    render();

    // Petit Bob: première niaiserie + bouton pour en pogner une autre
    var bm = document.getElementById('bobmot');
    if(bm) bm.textContent = bobMot();
    var bobBtn = document.getElementById('bob');
    if(bobBtn) bobBtn.addEventListener('click', showBob);
    // rotation douce, seulement si le mouvement est toléré
    try{
      if(window.matchMedia && window.matchMedia('(prefers-reduced-motion: no-preference)').matches){
        setInterval(showBob, 16000);
      }
    }catch(e){}

    // Le raton laveur guette la guimauve
    startRaccoonWatch();

    // PWA: enregistrement du service worker pour le mode hors-ligne
    if('serviceWorker' in navigator){
      try{ navigator.serviceWorker.register('sw.js'); }catch(e){}
    }
  })();
})();
</script>
</body>
</html>
